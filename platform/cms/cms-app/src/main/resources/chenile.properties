# Chenile configuration for CMS microservice

chenile.security.ignore=false
chenile.query.proxy.enabled=true
chenile.query.remote.base-url=http://localhost:8000/
chenile.base.url=http://localhost:8000
chenile.service.json.package=classpath*:com/homebase/ecom/**/service/*.json,classpath*:org/chenile/**/service/*.json
chenile.event.json.package=classpath*:com/homebase/ecom/cms/event/*.json
chenile.cache.json.package=classpath*:com/homebase/ecom/cms/cache/*.json

chenile.interceptors.path=org/chenile/core/chenile-core.xml

chenile.module.name=cms
chenile.config.path=com/homebase/ecom/config
chenile.pre.processors=populateContextContainer
chenile.post.processors=
chenile.copy.headers.strategy=

# KAFKA
chenile.kafka.sender[retries]=0
chenile.kafka.sender[batch.size]=16384
chenile.kafka.sender[linger.ms]=1
chenile.kafka.sender[buffer.memory]=33554432

chenile.kafka.consumer[enable.auto.commit]=true
chenile.kafka.consumer[auto.commit.interval.ms]=100
chenile.kafka.consumer[session.timeout.ms]=15000

# Cache
chenile.cache.name=cms-cache

# Swagger
chenile.swagger.options.headers[0].name=x-chenile-tenant-id
chenile.swagger.options.headers[0].required=false
chenile.swagger.options.headers[0].description=Tenant ID (defaults to homebase)
chenile.swagger.options.headers[1].name=x-chenile-region-id
chenile.swagger.options.headers[1].required=false
chenile.swagger.options.headers[1].description=Region ID for currency resolution
