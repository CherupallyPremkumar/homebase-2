spring:
  datasource:
    url: jdbc:h2:mem:orgdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  liquibase:
    enabled: true
    change-log: classpath:liquibase/organisation/changelog-master.xml
    contexts: dev
  main:
    allow-bean-definition-overriding: true
  security:
    oauth2:
      client:
        registration:
          keycloak:
            client-id: authz-servlet
            client-secret: secret
            scope: openid
        provider:
          keycloak:
            issuer-uri: http://localhost:8180/realms/homebase
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/homebase

chenile:
  base:
    url:
  security:
    ignore: true
    client:
      id: authz-servlet
      secret: secret
    keycloak:
      host: http://localhost:8180
      port: 8180
      base:
        realm: homebase
