apiVersion: v1
kind: Secret
metadata:
  name: config-server-secret
  namespace: config-server
type: Opaque
stringData:
  CONFIG_SERVER_USERNAME: "configadmin"
  CONFIG_SERVER_PASSWORD: "CHANGE_ME_IN_OVERLAY"
  ENCRYPT_KEY: "CHANGE_ME_IN_OVERLAY"
  # For private Git repo — mount SSH key or set these:
  # CONFIG_REPO_USERNAME: ""
  # CONFIG_REPO_PASSWORD: ""
