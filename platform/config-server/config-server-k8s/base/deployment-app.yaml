apiVersion: apps/v1
kind: Deployment
metadata:
  name: app
  namespace: config-server
  labels:
    app: config-server
    component: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
      component: app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: config-server
        component: app
    spec:
      terminationGracePeriodSeconds: 30
      containers:
        - name: config-server
          image: homebase/config-server-app:latest
          ports:
            - containerPort: 8888
              name: http
              protocol: TCP
          envFrom:
            - configMapRef:
                name: config-server-configmap
            - secretRef:
                name: config-server-secret
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8888
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8888
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8888
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 12
