# =====================================================================
# PROD — PostgreSQL common settings (DB URL per service in {service}-prod.yml)
# =====================================================================
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 30
      minimum-idle: 10
      leak-detection-threshold: 60000
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
  liquibase:
    enabled: true

logging:
  level:
    root: WARN
    com.homebase.ecom: INFO
