# =====================================================================
# SIT — PostgreSQL common settings (DB URL per service in {service}-sit.yml)
# =====================================================================
spring:
  datasource:
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:homebase_sit}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 15
      minimum-idle: 5
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
  liquibase:
    enabled: true
