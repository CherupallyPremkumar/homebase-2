# =====================================================================
# DEV — H2 in-memory for ALL services (no PostgreSQL needed)
# =====================================================================
spring:
  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:${spring.application.name};DB_CLOSE_DELAY=-1
    username: sa
    password:
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  flyway:
    enabled: false
  liquibase:
    enabled: false

logging:
  level:
    com.homebase.ecom: DEBUG
