server:
  port: 8888
  shutdown: graceful

spring:
  application:
    name: config-server
  lifecycle:
    timeout-per-shutdown-phase: 30s

  # --- Security credentials (override via env vars in production) ---
  security:
    user:
      name: ${CONFIG_SERVER_USERNAME:configadmin}
      password: ${CONFIG_SERVER_PASSWORD:changeme}

  cloud:
    config:
      server:
        # --- Git backend (production default) ---
        git:
          uri: ${CONFIG_REPO_URI:https://github.com/homebase-ecom/config-repo}
          default-label: ${CONFIG_REPO_BRANCH:main}
          search-paths: '{application}'
          clone-on-start: true
          timeout: 10
          # Force pull to always get latest from remote
          force-pull: true
          # Retry on Git failures
          try-master-branch: true
          # Private repo credentials (SSH key preferred in prod)
          # username: ${CONFIG_REPO_USERNAME:}
          # password: ${CONFIG_REPO_PASSWORD:}
          # Skip SSL verification only if using self-signed certs
          # skip-ssl-validation: false

        # --- Encryption support for {cipher} values ---
        encrypt:
          enabled: true

  # --- Native filesystem backend (for local dev — activate with 'native' profile) ---
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:git}

# --- Encryption key (symmetric — use JCE keystore in production) ---
encrypt:
  key: ${ENCRYPT_KEY:homebase-config-encrypt-key-change-in-prod}

# --- Actuator ---
management:
  endpoints:
    web:
      exposure:
        include: health,info,env,refresh,bus-refresh
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true
  info:
    env:
      enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true

# --- Logging ---
logging:
  level:
    org.springframework.cloud.config: INFO
    org.eclipse.jgit: WARN
    org.springframework.security: WARN
