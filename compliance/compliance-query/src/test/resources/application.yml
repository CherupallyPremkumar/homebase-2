logging:
  level:
    ROOT: INFO
    org.chenile.*: DEBUG

chenile:
  base:
    url:
  security:
    client:
      id: authz-servlet
      secret: secret
    keycloak:
      host: http://localhost:8180
      port: 8180
      base:
        realm: ${KEYCLOAK_REALM:tenant0}

pubsub:
  topic:
    separator: "."

spring:
  main:
    allow-bean-definition-overriding: true
  kafka:
    bootstrap-server: localhost:9092
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    hikari:
      poolName: Hikari
      auto-commit: false
  h2:
    console:
      enabled: true
  liquibase:
    change-log: classpath:liquibase/query/changelog/changelog-master.xml
    contexts: dev, faker
  jpa:
    hibernate:
      ddl-auto: none

server:
  port: 8000

query:
  defaultTenantId: homebase
  datasource's:
    homebase:
      maximumPoolSize: '10'
      type: com.zaxxer.hikari.HikariDataSource
      username: sa
      password:
      minimumIdle: '2'
      idleTimeout: '5000'
      jdbcUrl: jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
  mapperFiles: classpath*:com/homebase/ecom/query/service/mapper/*.xml
  definitionFiles: classpath*:com/homebase/ecom/query/service/mapper/*.json
