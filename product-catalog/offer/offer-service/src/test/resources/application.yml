logging:
  level:
    ROOT: INFO
    org.hibernate.SQL: INFO
    org.chenile.*: DEBUG

chenile:
  base:
    url:
  security:
    client:
      id: authz-servlet
      secret: secret
    keycloak:
      host: ${KEYCLOAK_HOST:http://localhost:8180}
      port: ${KEYCLOAK_PORT:8180}
      base:
        realm: ${KEYCLOAK_REALM:tenant0}

pubsub:
  topic:
    separator: "."

spring:
  main:
    allow-bean-definition-overriding: true
  kafka:
    bootstrap-server: localhost:9092
  banner:
    location: classpath:banner.txt
  jackson:
    serialization:
      indent-output: true
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:h2:mem:offer_test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: demo
    password: password
    hikari:
      poolName: Hikari
      auto-commit: false

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml
    contexts: dev, faker

  jpa:
    hibernate:
      ddl-auto: none

server:
  port: 8000
  error:
    whitelabel:
      enabled: false
