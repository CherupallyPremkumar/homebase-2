logging:
  level:
    ROOT: INFO
    org.hibernate.SQL: INFO
    org.chenile.*: DEBUG
    liquibase: DEBUG
    org.liquibase: DEBUG

spring:
  banner:
    location: classpath:banner.txt
  devtools:
    restart:
      enabled: true
      additional-exclude: static/**,.h2.server.properties
    livereload:
      enabled: false
  jackson:
    serialization:
      indent-output: true
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    hikari:
      poolName: Hikari
      auto-commit: false
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: none
  liquibase:
    enabled: false

  messages:
    cache-duration: PT1S
  thymeleaf:
    cache: false

server:
  port: 8000
  error:
    whitelabel:
      enabled: false

chenile:
    base:
        url:

query:
  defaultTenantId: homebase
  datasources:
    homebase:
      maximumPoolSize: '10'
      type: com.zaxxer.hikari.HikariDataSource
      username: sa
      password: ''
      minimumIdle: '2'
      idleTimeout: '5000'
      jdbcUrl: jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
  mapperFiles: classpath*:com/homebase/ecom/query/service/mapper/*.xml
  definitionFiles: classpath*:com/homebase/ecom/query/service/mapper/*.json
