logging:
  level:
    ROOT: INFO
    org.hibernate.SQL: INFO
    org.chenile.*: DEBUG

chenile:
  query:
    proxy:
      enabled: true
    remote:
      base-url: http://localhost:8081
  security:
    client:
      id: authz-servlet
      secret: secret
    keycloak:
      host: \${KEYCLOAK_HOST:http://localhost:8180}
      port: \${KEYCLOAK_PORT:8180}
      base:
        realm: \${KEYCLOAK_REALM:tenant0}
  base:
    url:

spring:
  main:
    allow-bean-definition-overriding: true
  banner:
    location: classpath:banner.txt
  jackson:
    serialization:
      indent-output: true
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:h2:mem:promotest;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: demo
    password: password
    hikari:
      poolName: Hikari
      auto-commit: false

  jpa:
    hibernate:
      ddl-auto: update
    database-platform: org.hibernate.dialect.H2Dialect

server:
  error:
    whitelabel:
      enabled: false

