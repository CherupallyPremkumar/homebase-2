# All Chenile configuration properties for Promo test

chenile.
chenile.module.name=testcase
chenile.pre.processors=
chenile.post.processors=
chenile.exception.handler=chenileExceptionHandler

chenile.query.proxy.enabled=true
chenile.query.remote.base-url=http://localhost:8081

chenile.service.json.package=classpath*:com/homebase/ecom/promo/service/*.json,classpath*:org/chenile/**/service/*.json
chenile.event.json.package=classpath*:com/homebase/ecom/promo/event/*.json
chenile.interceptors.path=org/chenile/core/chenile-core.xml
