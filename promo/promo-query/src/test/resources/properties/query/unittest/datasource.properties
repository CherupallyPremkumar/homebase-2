query.defaultTenantId=homebase
query.datasources.homebase.type=com.zaxxer.hikari.HikariDataSource
query.datasources.homebase.minimumIdle=2
query.datasources.homebase.maximumPoolSize=10
query.datasources.homebase.idleTimeout=5000
query.datasources.homebase.jdbcUrl=jdbc:h2:mem:datalake;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;INIT=RUNSCRIPT FROM 'classpath:schema.sql'
query.datasources.homebase.username=sa
query.datasources.homebase.password=

query.jpa.hibernate.show_sql=true
query.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
query.jpa.properties.hibernate.format_sql=true
query.jpa.hibernate.ddl-auto=create
query.jpa.database-platform=org.hibernate.dialect.H2Dialect

query.mapperFiles=classpath*:com/homebase/ecom/query/service/mapper/*.xml
query.definitionFiles=classpath*:com/homebase/ecom/query/service/mapper/*.json

spring.h2.console.enabled=true

##Liquibase
query.datasources.homebase.liquibase.change-log=classpath:liquibase/query/changelog/changelog-master.xml