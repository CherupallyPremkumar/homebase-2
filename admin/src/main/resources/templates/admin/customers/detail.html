<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{admin/layout/base :: layout(~{::title}, ~{::#content}, ~{::#head}, ~{::#scripts})}">

<head>
    <title>Customer Detail - Admin</title>
    <div id="head"></div>
</head>

<body>
    <div id="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-user me-2"></i>Customer Detail</h2>
            <a href="/admin/customers" class="btn btn-outline-secondary"><i class="fas fa-arrow-left me-1"></i>Back</a>
        </div>

        <div class="row">
            <div class="col-md-4">
                <!-- Customer Profile -->
                <div class="card mb-4">
                    <div class="card-body text-center">
                        <div class="rounded-circle bg-primary text-white d-flex align-items-center justify-content-center mx-auto mb-3"
                            style="width: 80px; height: 80px; font-size: 32px;">
                            <span
                                th:text="${customer.firstName != null ? customer.firstName.substring(0,1).toUpperCase() : '?'}">P</span>
                        </div>
                        <h4
                            th:text="${(customer.firstName != null ? customer.firstName : '') + ' ' + (customer.lastName != null ? customer.lastName : '')}">
                            Customer Name</h4>
                        <p class="text-muted" th:text="${customer.email}">email</p>
                        <p class="small text-muted">
                            Member since <span th:text="${#temporals.format(customer.createdAt, 'MMM yyyy')}">Jan
                                2024</span>
                        </p>
                    </div>
                </div>

                <!-- Stats -->
                <div class="card mb-4">
                    <div class="card-body">
                        <div class="d-flex justify-content-between mb-3">
                            <span class="text-muted">Total Orders</span>
                            <strong th:text="${totalOrders}">0</strong>
                        </div>
                        <div class="d-flex justify-content-between mb-3">
                            <span class="text-muted">Total Spend</span>
                            <strong class="text-success">₹<span
                                    th:text="${#numbers.formatDecimal(totalSpend, 1, 2)}">0.00</span></strong>
                        </div>
                        <div class="d-flex justify-content-between">
                            <span class="text-muted">Avg Order Value</span>
                            <strong>₹<span th:text="${#numbers.formatDecimal(avgOrderValue, 1, 2)}">0.00</span></strong>
                        </div>
                    </div>
                </div>

                <!-- Customer Info -->
                <div class="card">
                    <div class="card-header">
                        <h5>Details</h5>
                    </div>
                    <div class="card-body">
                        <p class="mb-2"><strong>ID:</strong><br><span class="font-monospace small"
                                th:text="${customer.id}">UUID</span></p>
                        <p class="mb-2" th:if="${customer.stripeCustomerId != null}">
                            <strong>Stripe ID:</strong><br>
                            <a th:href="'https://dashboard.stripe.com/customers/' + ${customer.stripeCustomerId}"
                                target="_blank" class="font-monospace small">
                                <span th:text="${customer.stripeCustomerId}">cus_123</span>
                                <i class="fas fa-external-link-alt ms-1" style="font-size:0.7em;"></i>
                            </a>
                        </p>
                        <p class="mb-0"><strong>Role:</strong> <span class="badge bg-secondary"
                                th:text="${customer.role}">ROLE_USER</span></p>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <!-- Order History -->
                <div class="card">
                    <div class="card-header">
                        <h5>Order History</h5>
                    </div>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                                <tr>
                                    <th>Date</th>
                                    <th>Order ID</th>
                                    <th>Status</th>
                                    <th>Total</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:if="${orders.empty}">
                                    <td colspan="4" class="text-center py-4 text-muted">No orders yet.</td>
                                </tr>
                                <tr th:each="order : ${orders}">
                                    <td><small th:text="${#temporals.format(order.createdAt, 'MMM dd, yyyy')}">Jan
                                            01</small></td>
                                    <td><a th:href="@{/admin/orders/{id}(id=${order.id})}"
                                            th:text="${#strings.abbreviate(order.id, 12)}" class="font-monospace">ID</a>
                                    </td>
                                    <td><span class="badge"
                                            th:classappend="${order.status.name() == 'PAID' or order.status.name() == 'DELIVERED' ? 'bg-success' : (order.status.name() == 'CANCELLED' ? 'bg-danger' : 'bg-warning')}"
                                            th:text="${order.status}">STATUS</span></td>
                                    <td class="fw-bold">₹<span
                                            th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)}">0.00</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="scripts"></div>
</body>

</html>
