<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{admin/layout/base :: layout(~{::title}, ~{::#content}, ~{::#head}, ~{::#scripts})}">

<head>
    <title>Customers Management</title>
    <th:block id="head"></th:block>
</head>

<body>
    <div id="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Customers</h2>
        </div>

        <div class="card">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Email</th>
                            <th>Role</th>
                            <th>Joined Date</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="customer : ${customers}">
                            <td th:text="${#strings.abbreviate(customer.id, 12)}">CUST-123</td>
                            <td th:text="${customer.firstName + ' ' + customer.lastName}">John Doe</td>
                            <td th:text="${customer.email}">john@example.com</td>
                            <td>
                                <span class="badge"
                                    th:classappend="${customer.role == 'ROLE_ADMIN' ? 'bg-primary' : 'bg-secondary'}"
                                    th:text="${customer.role}">ROLE_USER</span>
                            </td>
                            <td th:text="${#temporals.format(customer.createdAt, 'MMM dd, yyyy HH:mm')}">Jan 01, 2024
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(customers)}">
                            <td colspan="5" class="text-center text-muted py-4">No customers found.</td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <nav class="card-footer" th:if="${totalPages > 1}">
                <ul class="pagination justify-content-center">
                    <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage ? 'active' : ''}" class="page-item"
                        th:if="${totalPages > 0}">
                        <a th:href="@{/admin/customers(page=${i})}" class="page-link" th:text="${i + 1}">1</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
    <th:block id="scripts"></th:block>
</body>

</html>
