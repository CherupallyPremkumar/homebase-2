<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{admin/layout/base :: layout(~{::title}, ~{::#content}, ~{::#head}, ~{::#scripts})}">

<head>
    <title>Revenue Analytics</title>
    <th:block id="head"></th:block>
</head>

<body>
    <div id="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Revenue Analytics</h2>
            <div>
                <span class="text-muted">Last <span th:text="${days}">30</span> days</span>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header">
                        <h5>Revenue Trend</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="revenueTrendChart"></canvas>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card">
                    <div class="card-header">
                        <h5>Top Products</h5>
                    </div>
                    <div class="card-body">
                        <ul class="list-unstyled">
                            <li th:each="product : ${topProducts}" class="mb-3">
                                <div class="d-flex justify-content-between">
                                    <span th:text="${product.name}">Product</span>
                                    <span class="badge bg-primary" th:text="${product.sales}">0</span>
                                </div>
                                <div class="progress mt-1">
                                    <div class="progress-bar" th:style="'width: ' + ${product.percentage} + '%'"></div>
                                </div>
                            </li>
                            <li th:if="${#lists.isEmpty(topProducts)}" class="text-muted text-center py-3">
                                No product data available yet.
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <th:block id="scripts">
        <script th:inline="javascript">
            /*<![CDATA[*/
            var trendData = /*[[${revenueTrend}]]*/[];
            if (trendData.length > 0) {
                var labels = trendData.map(function (d) { return d.date; });
                var amounts = trendData.map(function (d) { return d.amount; });
                var ctx = document.getElementById('revenueTrendChart').getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: labels,
                        datasets: [{
                            label: 'Revenue (₹)',
                            data: amounts,
                            borderColor: '#e94560',
                            backgroundColor: 'rgba(233,69,96,0.1)',
                            tension: 0.4,
                            fill: true
                        }]
                    },
                    options: { responsive: true, scales: { y: { beginAtZero: true } } }
                });
            }
            /*]]>*/
        </script>
    </th:block>
</body>

</html>
