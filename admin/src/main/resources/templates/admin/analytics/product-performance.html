<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{admin/layout/base :: layout(~{::title}, ~{::#content}, ~{::#head}, ~{::#scripts})}">

<head>
    <title>Product Performance</title>
    <th:block id="head"></th:block>
</head>

<body>
    <div id="content">
        <h2 class="mb-4">Product Performance</h2>

        <div class="row">
            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header">
                        <h5>Top Selling Products</h5>
                    </div>
                    <div class="card-body">
                        <ul class="list-unstyled">
                            <li th:each="product : ${topProducts}" class="mb-3">
                                <div class="d-flex justify-content-between">
                                    <strong th:text="${product.name}">Product</strong>
                                    <span class="badge bg-primary" th:text="${product.sales}">0</span>
                                </div>
                                <div class="progress mt-1">
                                    <div class="progress-bar" th:style="'width: ' + ${product.percentage} + '%'"></div>
                                </div>
                            </li>
                            <li th:if="${#lists.isEmpty(topProducts)}" class="text-muted text-center py-3">
                                No sales data available yet.
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="col-md-6">
                <div class="card mb-4">
                    <div class="card-header">
                        <h5>Slow Moving Products</h5>
                    </div>
                    <div class="card-body">
                        <ul class="list-unstyled">
                            <li th:each="product : ${slowMovingProducts}" class="mb-2">
                                <span th:text="${product}">Product</span>
                            </li>
                            <li th:if="${#lists.isEmpty(slowMovingProducts)}" class="text-muted text-center py-3">
                                No slow moving products detected.
                            </li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <th:block id="scripts"></th:block>
</body>

</html>
