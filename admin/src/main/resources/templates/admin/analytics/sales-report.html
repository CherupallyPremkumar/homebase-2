<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{admin/layout/base :: layout(~{::title}, ~{::#content}, ~{::#head}, ~{::#scripts})}">

<head>
    <title>Sales Report</title>
    <th:block id="head"></th:block>
</head>

<body>
    <div id="content">
<div class="d-flex justify-content-between align-items-center mb-4">
                <h2>Sales Report</h2>
                <a href="/admin/analytics/sales?export=pdf" class="btn btn-outline-danger">
                    <i class="fas fa-file-pdf"></i> Export PDF
                </a>
            </div>

            <!-- Date Range Filter -->
            <div class="card mb-4">
                <div class="card-body">
                    <form method="get" class="row g-3">
                        <div class="col-md-3">
                            <label class="form-label">Start Date</label>
                            <input type="date" name="startDate" class="form-control" th:value="${startDate}">
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">End Date</label>
                            <input type="date" name="endDate" class="form-control" th:value="${endDate}">
                        </div>
                        <div class="col-md-6 d-flex align-items-end">
                            <button type="submit" class="btn btn-primary">Generate Report</button>
                        </div>
                    </form>
                </div>
            </div>

            <!-- Report Stats -->
            <div class="row mb-4">
                <div class="col-md-3">
                    <div class="card-stat">
                        <div class="stat-label">Total Sales</div>
                        <div class="stat-value">₹<span
                                th:text="${#numbers.formatDecimal(report.totalSales, 1, 2)}">0.00</span></div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card-stat">
                        <div class="stat-label">Total Orders</div>
                        <div class="stat-value" th:text="${report.totalOrders}">0</div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card-stat">
                        <div class="stat-label">Avg Order Value</div>
                        <div class="stat-value">₹<span
                                th:text="${#numbers.formatDecimal(report.avgOrderValue, 1, 2)}">0.00</span></div>
                    </div>
                </div>
                <div class="col-md-3">
                    <div class="card-stat">
                        <div class="stat-label">Total Customers</div>
                        <div class="stat-value" th:text="${report.totalCustomers}">0</div>
                    </div>
                </div>
            </div>

            <!-- Detailed Report -->
            <div class="card">
                <div class="card-header">
                    <h5>Detailed Sales Data</h5>
                </div>
                <div class="table-responsive">
                    <table class="table">
                        <thead class="table-light">
                            <tr>
                                <th>Date</th>
                                <th>Orders</th>
                                <th>Sales</th>
                                <th>Avg Order Value</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="row : ${report.dailyData}">
                                <td th:text="${#temporals.format(row.date, 'MMM dd, yyyy')}">Jan 01, 2024</td>
                                <td th:text="${row.orderCount}">0</td>
                                <td>₹<span th:text="${#numbers.formatDecimal(row.sales, 1, 2)}">0.00</span></td>
                                <td>₹<span th:text="${#numbers.formatDecimal(row.avgValue, 1, 2)}">0.00</span></td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        
    </div>
    <th:block id="scripts"></th:block>
</body>

</html>
