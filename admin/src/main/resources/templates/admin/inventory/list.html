<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{admin/layout/base :: layout(~{::title}, ~{::#content}, ~{::#head}, ~{::#scripts})}">

<head>
    <title>Inventory Management</title>
    <th:block id="head"></th:block>
</head>

<body>
    <div id="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Inventory</h2>
            <a href="/admin/inventory/alerts/low-stock" class="btn btn-warning">
                <i class="fas fa-exclamation-triangle"></i>
                Low Stock Alert
                <span class="badge bg-danger" th:text="${lowStockCount}">0</span>
            </a>
        </div>

        <!-- Success / Error Messages -->
        <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show">
            <i class="fas fa-check-circle me-1"></i>
            <span th:text="${param.success}">Success</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show">
            <i class="fas fa-exclamation-circle me-1"></i>
            <span th:text="${param.error}">Error</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Stock Status Filters -->
        <div class="mb-4">
            <a href="/admin/inventory" class="btn btn-outline-secondary"
                th:classappend="${status == null ? 'active' : ''}">All</a>
            <a href="/admin/inventory?status=low" class="btn btn-outline-warning"
                th:classappend="${status == 'low' ? 'active' : ''}">
                Low Stock <span class="badge bg-warning text-dark" th:text="${lowStockCount}">0</span>
            </a>
            <a href="/admin/inventory?status=out" class="btn btn-outline-danger"
                th:classappend="${status == 'out' ? 'active' : ''}">
                Out of Stock <span class="badge bg-danger" th:text="${outOfStockCount}">0</span>
            </a>
        </div>

        <!-- Inventory Table -->
        <div class="card">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>Product</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Current Stock</th>
                            <th>Reserved</th>
                            <th>Available</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${inventory}">
                            <td>
                                <a th:href="@{/admin/products/{id}/edit(id=${item.productId})}"
                                    class="text-decoration-none fw-medium">
                                    <span th:text="${item.productName}">Product Name</span>
                                </a>
                            </td>
                            <td>
                                <span class="badge bg-light text-dark" th:text="${item.productCategory}">Category</span>
                            </td>
                            <td>
                                <span th:if="${item.productPrice != null}">
                                    ₹<span th:text="${#numbers.formatDecimal(item.productPrice, 1, 2)}">0.00</span>
                                </span>
                                <span th:if="${item.productPrice == null}" class="text-muted">—</span>
                            </td>
                            <td th:text="${item.quantity}">0</td>
                            <td th:text="${item.reserved}">0</td>
                            <td>
                                <span class="fw-bold" th:text="${item.availableQuantity}">0</span>
                            </td>
                            <td>
                                <span class="badge bg-danger" th:if="${item.availableQuantity == 0}">Out of Stock</span>
                                <span class="badge bg-warning text-dark"
                                    th:if="${item.availableQuantity > 0 and item.availableQuantity < item.lowStockThreshold}">Low
                                    Stock</span>
                                <span class="badge bg-success"
                                    th:if="${item.availableQuantity >= item.lowStockThreshold}">In Stock</span>
                            </td>
                            <td>
                                <button class="btn btn-sm btn-outline-primary" data-bs-toggle="modal"
                                    data-bs-target="#adjustStockModal" th:data-product-id="${item.productId}"
                                    th:data-product-name="${item.productName}"
                                    th:data-current-qty="${item.availableQuantity}">
                                    <i class="fas fa-sliders-h"></i> Adjust
                                </button>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(inventory)}">
                            <td colspan="8" class="text-center text-muted py-4">
                                No inventory items found.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Adjust Stock Modal -->
        <div class="modal fade" id="adjustStockModal">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form id="adjustForm" method="post">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="modal-header">
                            <h5 class="modal-title">Adjust Stock — <span id="modalProductName">Product</span></h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label">Current Available Qty</label>
                                <input type="text" id="currentQty" class="form-control" readonly>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">New Quantity</label>
                                <input type="number" name="newQuantity" class="form-control" required min="0">
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Reason</label>
                                <select name="reason" class="form-select" required>
                                    <option value="">Select reason...</option>
                                    <option value="recount">Recount</option>
                                    <option value="damage">Damage</option>
                                    <option value="return">Return</option>
                                    <option value="lost">Lost/Theft</option>
                                    <option value="restock">Restock</option>
                                    <option value="other">Other</option>
                                </select>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary">Update Stock</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <th:block id="scripts">
        <script>
            const adjustStockModal = document.getElementById('adjustStockModal');
            if (adjustStockModal) {
                adjustStockModal.addEventListener('show.bs.modal', function (event) {
                    const button = event.relatedTarget;
                    const productId = button.getAttribute('data-product-id');
                    const productName = button.getAttribute('data-product-name');
                    const currentQty = button.getAttribute('data-current-qty');

                    document.getElementById('modalProductName').textContent = productName;
                    document.getElementById('currentQty').value = currentQty;
                    document.getElementById('adjustForm').action = '/admin/inventory/' + productId + '/adjust';
                });
            }
        </script>
    </th:block>
</body>

</html>
