<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{admin/layout/base :: layout(~{::title}, ~{::#content}, ~{::#head}, ~{::#scripts})}">

<head>
    <title>Notifications - Admin</title>
    <div id="head"></div>
</head>

<body>
    <div id="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-bell me-2"></i>Notifications <span class="badge bg-danger" th:if="${unreadCount > 0}"
                    th:text="${unreadCount}">0</span></h2>
            <form method="post" action="/admin/notifications/read-all" class="d-inline" th:if="${unreadCount > 0}">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                <button type="submit" class="btn btn-outline-primary btn-sm"><i
                        class="fas fa-check-double me-1"></i>Mark All Read</button>
            </form>
        </div>

        <div class="card">
            <div class="list-group list-group-flush">
                <div th:if="${notifications.empty}" class="list-group-item text-center py-5 text-muted">
                    <i class="fas fa-bell-slash fa-2x mb-2"></i><br>No notifications yet.
                </div>
                <div th:each="n : ${notifications}" class="list-group-item d-flex align-items-start"
                    th:classappend="${!n.read ? 'list-group-item-light' : ''}">
                    <div class="me-3 mt-1">
                        <i class="fas" th:classappend="${n.type == 'ORDER' ? 'fa-shopping-cart text-primary' : 
                                             (n.type == 'REFUND' ? 'fa-undo text-warning' : 
                                             (n.type == 'ALERT' ? 'fa-exclamation-triangle text-danger' : 
                                             'fa-box text-info'))}"></i>
                    </div>
                    <div class="flex-grow-1">
                        <div class="d-flex justify-content-between">
                            <strong th:text="${n.title}">Title</strong>
                            <small class="text-muted"
                                th:text="${#temporals.format(n.createdAt, 'MMM dd, HH:mm')}">Date</small>
                        </div>
                        <p class="mb-1 small" th:text="${n.message}">Message</p>
                        <div class="d-flex gap-2">
                            <a th:if="${n.link != null}" th:href="${n.link}"
                                class="btn btn-sm btn-outline-primary">View</a>
                            <form th:if="${!n.read}" method="post"
                                th:action="@{/admin/notifications/{id}/read(id=${n.id})}" class="d-inline">
                                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                <button type="submit" class="btn btn-sm btn-outline-secondary">Dismiss</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div id="scripts"></div>
</body>

</html>
