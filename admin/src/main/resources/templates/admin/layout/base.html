<!DOCTYPE html>
<html th:fragment="layout(pageTitle, content, head, scripts)" xmlns:th="http://www.thymeleaf.org"
    xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${pageTitle}">Admin</title>

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Bootstrap -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>

    <style>
        :root {
            --sidebar-bg: linear-gradient(180deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            --sidebar-width: 260px;
            --accent: #e94560;
            --accent-light: #ff6b81;
            --bg-page: #f0f2f5;
            --card-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
            --card-hover-shadow: 0 8px 25px rgba(0, 0, 0, 0.12);
            --transition: all 0.3s cubic-bezier(.4, 0, .2, 1);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-page);
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .admin-container {
            display: flex;
            min-height: 100vh;
        }

        /* ── Sidebar ── */
        .sidebar {
            width: var(--sidebar-width);
            background: var(--sidebar-bg);
            color: #c8d6e5;
            padding: 28px 20px 20px;
            position: fixed;
            left: 0;
            top: 0;
            height: 100vh;
            overflow-y: auto;
            z-index: 100;
        }

        .sidebar-logo {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 36px;
            letter-spacing: -0.3px;
        }

        .sidebar-logo i {
            color: var(--accent);
            margin-right: 8px;
        }

        .sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .sidebar-menu li {
            margin-bottom: 4px;
        }

        .sidebar-menu a {
            color: #a4b0be;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
        }

        .sidebar-menu a i {
            width: 18px;
            text-align: center;
            font-size: 15px;
        }

        .sidebar-menu a:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
            transform: translateX(4px);
        }

        .sidebar-menu a.active {
            background: var(--accent);
            color: #fff;
            box-shadow: 0 4px 15px rgba(233, 69, 96, 0.35);
        }

        .sidebar-logout {
            color: #a4b0be;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 11px 14px;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            transition: var(--transition);
        }

        .sidebar-logout:hover {
            background: rgba(231, 76, 60, 0.15);
            color: #e74c3c;
        }

        /* ── Main Content ── */
        .main-content {
            margin-left: var(--sidebar-width);
            flex: 1;
            padding: 24px 30px;
            min-height: 100vh;
        }

        /* ── Navbar ── */
        .navbar-admin {
            background: #fff;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            margin-bottom: 24px;
            padding: 14px 20px;
        }

        .navbar-admin h5 {
            font-weight: 600;
            color: #2c3e50;
            margin: 0;
            font-size: 16px;
        }

        /* ── Stat Cards ── */
        .card-stat {
            background: #fff;
            border-left: 4px solid var(--accent);
            padding: 22px 20px;
            margin-bottom: 20px;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
        }

        .card-stat:hover {
            box-shadow: var(--card-hover-shadow);
            transform: translateY(-2px);
        }

        .card-stat .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: -0.5px;
        }

        .card-stat .stat-label {
            color: #7f8c8d;
            font-size: 13px;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        /* ── Cards ── */
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            transition: var(--transition);
            overflow: hidden;
        }

        .card:hover {
            box-shadow: var(--card-hover-shadow);
        }

        .card-header {
            background: #fff;
            border-bottom: 1px solid #f0f0f0;
            padding: 16px 20px;
        }

        .card-header h5 {
            font-weight: 600;
            font-size: 15px;
            color: #2c3e50;
            margin: 0;
        }

        .card-body {
            padding: 20px;
        }

        .card-footer {
            background: #fafbfc;
        }

        /* ── Tables ── */
        .table {
            margin-bottom: 0;
        }

        .table thead th {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #7f8c8d;
            border-bottom-width: 1px;
            padding: 12px 16px;
        }

        .table tbody td {
            padding: 14px 16px;
            vertical-align: middle;
            font-size: 14px;
            color: #2c3e50;
        }

        .table-hover tbody tr:hover {
            background-color: #f8f9ff;
        }

        /* ── Badges ── */
        .badge {
            font-weight: 500;
            font-size: 12px;
            padding: 5px 10px;
            border-radius: 6px;
        }

        /* ── Buttons ── */
        .btn-primary {
            background: var(--accent);
            border-color: var(--accent);
        }

        .btn-primary:hover {
            background: var(--accent-light);
            border-color: var(--accent-light);
        }

        .btn-outline-primary {
            color: var(--accent);
            border-color: var(--accent);
        }

        .btn-outline-primary:hover {
            background: var(--accent);
            border-color: var(--accent);
            color: #fff;
        }

        /* ── Progress Bars ── */
        .progress {
            height: 6px;
            border-radius: 3px;
        }

        .progress-bar {
            background: var(--accent);
            border-radius: 3px;
        }

        /* ── Scrollbar ── */
        .sidebar::-webkit-scrollbar {
            width: 4px;
        }

        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }

        .sidebar::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
        }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
                padding: 20px 10px;
            }

            .sidebar-logo span,
            .sidebar-menu a span {
                display: none;
            }

            .main-content {
                margin-left: 70px;
                padding: 16px;
            }
        }
    </style>

    <th:block th:if="${head != null}">
        <th:block th:replace="${head}"></th:block>
    </th:block>
</head>

<body>
    <div class="admin-container">
        <!-- Sidebar -->
        <div th:replace="~{admin/layout/sidebar}"></div>

        <!-- Main Content -->
        <div class="main-content">
            <!-- Navbar -->
            <div th:replace="~{admin/layout/navbar}"></div>

            <!-- Page Content -->
            <th:block th:if="${content != null}">
                <th:block th:replace="${content}"></th:block>
            </th:block>
            <th:block th:if="${content == null}">
                <p>No content provided</p>
            </th:block>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <th:block th:if="${scripts != null}">
        <th:block th:replace="${scripts}"></th:block>
    </th:block>
</body>

</html>
