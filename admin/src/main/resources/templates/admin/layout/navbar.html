<div class="navbar-admin d-flex justify-content-between align-items-center">
    <div>
        <h5 class="mb-0">Admin Panel</h5>
    </div>

    <div class="d-flex gap-3 align-items-center">
        <!-- Notification Bell -->
        <a href="/admin/notifications" class="btn btn-sm btn-light position-relative" title="Notifications">
            <i class="fas fa-bell"></i>
            <span id="notif-badge"
                class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger"
                style="font-size: 0.65em; display: none;">0</span>
        </a>

        <!-- Search -->
        <input type="text" class="form-control form-control-sm" style="width: 200px;" placeholder="Search...">

        <!-- User Menu -->
        <div class="dropdown">
            <button class="btn btn-sm btn-light dropdown-toggle" type="button" data-bs-toggle="dropdown"
                aria-expanded="false">
                <i class="fas fa-user-circle"></i>
                <span sec:authentication="name">Admin</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end">
                <li><a class="dropdown-item" href="/admin/dashboard"><i
                            class="fas fa-tachometer-alt me-2"></i>Dashboard</a></li>
                <li>
                    <hr class="dropdown-divider">
                </li>
                <li>
                    <form th:action="@{/admin/logout}" method="post" class="m-0">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <button type="submit" class="dropdown-item text-danger">
                            <i class="fas fa-sign-out-alt me-2"></i>Logout
                        </button>
                    </form>
                </li>
            </ul>
        </div>
    </div>
</div>
