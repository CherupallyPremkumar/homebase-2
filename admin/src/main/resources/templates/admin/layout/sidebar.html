<div class="sidebar">
    <div class="sidebar-logo">
        <i class="fas fa-store"></i> HomeMade
    </div>

    <ul class="sidebar-menu">
        <!-- Dashboard -->
        <li>
            <a href="/admin/dashboard" th:classappend="${currentUri == '/admin/dashboard' ? 'active' : ''}">
                <i class="fas fa-home"></i> Dashboard
            </a>
        </li>

        <!-- Orders -->
        <li>
            <a href="/admin/orders"
                th:classappend="${currentUri != null and currentUri.startsWith('/admin/orders') ? 'active' : ''}">
                <i class="fas fa-shopping-bag"></i> Orders
            </a>
        </li>

        <!-- Products -->
        <li>
            <a href="/admin/products"
                th:classappend="${currentUri != null and currentUri.startsWith('/admin/products') ? 'active' : ''}">
                <i class="fas fa-box"></i> Products
            </a>
        </li>

        <!-- Inventory -->
        <li>
            <a href="/admin/inventory"
                th:classappend="${currentUri != null and currentUri.startsWith('/admin/inventory') ? 'active' : ''}">
                <i class="fas fa-warehouse"></i> Inventory
                <span th:if="${lowStockCount != null and lowStockCount > 0}" class="badge bg-danger ms-1"
                    th:text="${lowStockCount}">0</span>
            </a>
        </li>

        <!-- Customers -->
        <li>
            <a href="/admin/customers"
                th:classappend="${currentUri != null and currentUri.startsWith('/admin/customers') ? 'active' : ''}">
                <i class="fas fa-users"></i> Customers
            </a>
        </li>

        <!-- Analytics -->
        <li th:if="${adminAnalyticsEnabled}">
            <a href="/admin/analytics"
                th:classappend="${currentUri != null and currentUri.startsWith('/admin/analytics') ? 'active' : ''}">
                <i class="fas fa-chart-bar"></i> Analytics
            </a>
        </li>

        <!-- Payments -->
        <li class="nav-item" th:if="${adminPaymentsEnabled}">
            <a href="/admin/payments/dashboard"
                th:classappend="${currentUri != null and currentUri.startsWith('/admin/payments') ? 'active' : ''}">
                <i class="fas fa-wallet"></i> Payments
            </a>
            <ul class="list-unstyled ms-4 small"
                th:if="${currentUri != null and currentUri.startsWith('/admin/payments')}">
                <li><a href="/admin/payments/dashboard" class="text-white-50 text-decoration-none">Dashboard</a></li>
                <li><a href="/admin/payments/transactions" class="text-white-50 text-decoration-none">Transactions</a>
                </li>
                <li><a href="/admin/payments/payouts" class="text-white-50 text-decoration-none">Payouts</a></li>
                <li><a href="/admin/payments/gateways" class="text-white-50 text-decoration-none">Gateways</a></li>
            </ul>
        </li>

        <!-- Refunds -->
        <li th:if="${adminRefundsEnabled}">
            <a href="/admin/refunds"
                th:classappend="${currentUri != null and currentUri.startsWith('/admin/refunds') ? 'active' : ''}">
                <i class="fas fa-undo"></i> Refunds
            </a>
        </li>

        <!-- Audit Log -->
        <li th:if="${adminAuditEnabled}">
            <a href="/admin/audit"
                th:classappend="${currentUri != null and currentUri.startsWith('/admin/audit') ? 'active' : ''}">
                <i class="fas fa-clipboard-list"></i> Audit Log
            </a>
        </li>

        <!-- Notifications -->
        <li th:if="${adminNotificationsEnabled}">
            <a href="/admin/notifications"
                th:classappend="${currentUri != null and currentUri.startsWith('/admin/notifications') ? 'active' : ''}">
                <i class="fas fa-bell"></i> Notifications
            </a>
        </li>
    </ul>

    <hr style="border-color: rgba(255,255,255,0.1);">

    <!-- Logout -->
    <form th:action="@{/admin/logout}" method="post" class="m-0">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button type="submit" class="sidebar-logout btn btn-link w-100 text-start p-0">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </form>
</div>
