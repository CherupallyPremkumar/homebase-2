<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{admin/layout/base :: layout(~{::title}, ~{::#content}, ~{::#head}, ~{::#scripts})}">

<head>
    <title>Products Management</title>
    <th:block id="head"></th:block>
</head>

<body>
    <div id="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Products</h2>
            <div class="d-flex gap-2">
                <a href="/admin/products/create" class="btn btn-primary">
                    <i class="fas fa-plus"></i> Add Product
                </a>
                <button class="btn btn-outline-secondary" data-bs-toggle="modal" data-bs-target="#importModal">
                    <i class="fas fa-upload"></i> Import CSV
                </button>
            </div>
        </div>

        <!-- Success / Error Messages -->
        <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show">
            <i class="fas fa-check-circle me-1"></i>
            <span th:text="${param.success}">Success</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show">
            <i class="fas fa-exclamation-circle me-1"></i>
            <span th:text="${param.error}">Error</span>
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>

        <!-- Filters -->
        <div class="card mb-4">
            <div class="card-body">
                <form method="get" class="row g-3">
                    <div class="col-md-6">
                        <input type="text" name="search" class="form-control" placeholder="Search products..."
                            th:value="${param.search}">
                    </div>
                    <div class="col-md-4">
                        <select name="category" class="form-select">
                            <option value="">All Categories</option>
                            <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}"
                                th:selected="${param.category != null and param.category == cat}">Category</option>
                        </select>
                    </div>
                    <div class="col-md-2">
                        <button type="submit" class="btn btn-primary w-100">Filter</button>
                    </div>
                </form>
            </div>
        </div>

        <!-- Products Table -->
        <div class="card">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-light">
                        <tr>
                            <th>Image</th>
                            <th>Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="product : ${products}">
                            <td>
                                <img th:if="${product.imageUrl != null and !product.imageUrl.isEmpty()}"
                                    th:src="${product.imageUrl}" alt="product"
                                    style="width: 40px; height: 40px; object-fit: cover; border-radius: 6px;">
                                <span th:if="${product.imageUrl == null or product.imageUrl.isEmpty()}"
                                    class="text-muted"><i class="fas fa-image"></i></span>
                            </td>
                            <td>
                                <a th:href="@{/admin/products/{id}/edit(id=${product.id})}"
                                    class="text-decoration-none fw-medium" th:text="${product.name}">Product Name</a>
                            </td>
                            <td>
                                <span class="badge bg-light text-dark" th:text="${product.category}">Category</span>
                            </td>
                            <td>₹<span th:text="${#numbers.formatDecimal(product.price, 1, 2)}">0.00</span></td>
                            <td>
                                <span class="badge"
                                    th:classappend="${product.stock != null and product.stock > 0 ? 'bg-info' : 'bg-danger'}"
                                    th:text="${product.stock != null ? product.stock : 'N/A'}">0</span>
                            </td>
                            <td>
                                <span class="badge"
                                    th:classappend="${product.status == 'ACTIVE' ? 'bg-success' : (product.status == 'PENDING_INVENTORY' ? 'bg-warning text-dark' : 'bg-secondary')}"
                                    th:text="${product.status}">STATUS</span>
                            </td>
                            <td>
                                <div class="d-flex gap-1">
                                    <a th:href="@{/admin/products/{id}/edit(id=${product.id})}"
                                        class="btn btn-sm btn-outline-primary">
                                        <i class="fas fa-edit"></i>
                                    </a>
                                    <form method="post" th:action="@{/admin/products/{id}/delete(id=${product.id})}"
                                        style="display: inline;">
                                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                            onclick="return confirm('Are you sure you want to delete this product?')">
                                            <i class="fas fa-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(products)}">
                            <td colspan="7" class="text-center text-muted py-4">
                                No products found. <a href="/admin/products/create">Create your first product</a>.
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Pagination -->
            <nav class="card-footer" th:if="${totalPages > 1}">
                <ul class="pagination justify-content-center mb-0">
                    <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:classappend="${i == currentPage ? 'active' : ''}" class="page-item">
                        <a th:href="@{/admin/products(page=${i},category=${param.category})}" class="page-link"
                            th:text="${i + 1}">1</a>
                    </li>
                </ul>
            </nav>
        </div>

        <!-- Import Modal -->
        <div class="modal fade" id="importModal">
            <div class="modal-dialog">
                <div class="modal-content">
                    <form method="post" th:action="@{/admin/products/import}" enctype="multipart/form-data">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                        <div class="modal-header">
                            <h5 class="modal-title">Import Products</h5>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>
                        <div class="modal-body">
                            <div class="mb-3">
                                <label class="form-label">CSV File</label>
                                <input type="file" name="file" class="form-control" accept=".csv" required>
                                <small class="text-muted">
                                    Format: name, description, category, price
                                </small>
                            </div>
                        </div>
                        <div class="modal-footer">
                            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                            <button type="submit" class="btn btn-primary">Import</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <th:block id="scripts"></th:block>
</body>

</html>
