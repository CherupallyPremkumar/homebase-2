<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{admin/layout/base :: layout(~{::title}, ~{::#content}, ~{::#head}, ~{::#scripts})}">

<head>
    <title>Create Product - Admin</title>
    <th:block id="head"></th:block>
</head>

<body>
    <div id="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2>Create New Product</h2>
            <a href="/admin/products" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left"></i> Back to List
            </a>
        </div>

        <div class="card shadow-sm">
            <div class="card-body">
                <form th:action="@{/admin/products/create}" th:object="${product}" method="post">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label">Product Name</label>
                            <input type="text" th:field="*{name}" class="form-control" required
                                placeholder="Enter product name">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Category</label>
                            <select th:field="*{category}" class="form-select" required>
                                <option value="">Select Category</option>
                                <option th:each="cat : ${categories}" th:value="${cat}" th:text="${cat}">Category
                                </option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label">Description</label>
                            <textarea th:field="*{description}" class="form-control" rows="3"
                                placeholder="Enter product description"></textarea>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Price (₹)</label>
                            <input type="number" step="0.01" th:field="*{price}" class="form-control" required
                                placeholder="0.00">
                            <div class="form-text text-muted">This will create a 'SYSTEM' offer for this product.
                            </div>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">Image URL (Optional)</label>
                            <input type="text" th:field="*{imageUrl}" class="form-control" placeholder="Image URL">
                        </div>
                        <div class="col-12 mt-4">
                            <button type="submit" class="btn btn-primary px-4">
                                <i class="fas fa-save me-1"></i> Create Product
                            </button>
                            <button type="reset" class="btn btn-light ms-2">Reset</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>

    </div>
    <th:block id="scripts"></th:block>
</body>

</html>
