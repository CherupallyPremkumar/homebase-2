<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{admin/layout/base :: layout(~{::title}, ~{::#content}, ~{::#head}, ~{::#scripts})}">

<head>
    <title>Payouts - Admin</title>
    <th:block id="head"></th:block>
</head>

<body>
    <div id="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-university me-2"></i>Payouts</h2>
            <div>
                <span class="badge bg-info text-dark me-2">
                    Gateway: <span class="text-capitalize" th:text="${activeGateway}">stripe</span>
                </span>
                <a th:href="@{/admin/payments/payouts(gateway=${activeGateway})}" class="btn btn-outline-secondary btn-sm">
                    <i class="fas fa-sync-alt me-1"></i>Refresh
                </a>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>Provider Payout ID</th>
                                <th>Status</th>
                                <th>Date</th>
                                <th>Matched</th>
                                <th>Issues</th>
                                <th class="text-end">Gross</th>
                                <th class="text-end">Fees</th>
                                <th class="text-end">Net</th>
                                <th></th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="p : ${payouts}">
                                <td class="font-monospace small" th:text="${p.providerPayoutId}">po_123</td>
                                <td>
                                    <span class="badge"
                                        th:classappend="${p.status == 'paid' or p.status == 'PAID' ? 'bg-success' : 'bg-secondary'}"
                                        th:text="${p.status}">PAID</span>
                                </td>
                                <td class="small text-muted"
                                    th:text="${p.payoutAt != null ? #temporals.format(p.payoutAt, 'dd-MMM-yyyy HH:mm') : '—'}">—</td>
                                <td>
                                    <span class="badge"
                                        th:classappend="${p.matchedPercent != null and p.matchedPercent.doubleValue() >= 95 ? 'bg-success' : (p.matchedPercent != null and p.matchedPercent.doubleValue() >= 80 ? 'bg-warning text-dark' : 'bg-danger')}"
                                        th:text="${(p.matchedPercent != null ? p.matchedPercent : 0) + '%'}">0%</span>
                                    <small class="text-muted" th:text="${'(' + p.matchedLines + '/' + p.totalLines + ')'}">(0/0)</small>
                                </td>
                                <td>
                                    <span class="badge" th:classappend="${p.issuesCount > 0 ? 'bg-danger' : 'bg-success'}"
                                        th:text="${p.issuesCount}">0</span>
                                </td>
                                <td class="text-end fw-bold">
                                    <span th:text="${p.currency}">INR</span>
                                    <span th:text="${#numbers.formatDecimal(p.grossAmount, 1, 2)}">0.00</span>
                                </td>
                                <td class="text-end">
                                    <span th:text="${p.currency}">INR</span>
                                    <span th:text="${#numbers.formatDecimal(p.feeAmount, 1, 2)}">0.00</span>
                                </td>
                                <td class="text-end fw-bold">
                                    <span th:text="${p.currency}">INR</span>
                                    <span th:text="${#numbers.formatDecimal(p.netAmount, 1, 2)}">0.00</span>
                                </td>
                                <td class="text-end">
                                    <a th:href="@{/admin/payments/payouts/{id}(id=${p.payoutId})}"
                                        class="btn btn-sm btn-outline-primary">
                                        View
                                    </a>
                                </td>
                            </tr>

                            <tr th:if="${payouts == null or payouts.isEmpty()}">
                                <td colspan="9" class="text-center text-muted py-4">
                                    <i class="fas fa-info-circle me-1"></i>No payouts recorded yet.
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <th:block id="scripts"></th:block>
</body>

</html>
