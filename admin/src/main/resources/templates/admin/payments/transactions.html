<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{admin/layout/base :: layout(~{::title}, ~{::#content}, ~{::#head}, ~{::#scripts})}">

<head>
    <title>Transaction History - Admin</title>
    <div id="head"></div>
</head>

<body>
    <div id="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-history me-2"></i>Transaction History</h2>
            <div class="d-flex gap-2 align-items-center">
                <select class="form-select form-select-sm" style="width: auto;">
                    <option value="">All Statuses</option>
                    <option value="SUCCEEDED">Succeeded</option>
                    <option value="FAILED">Failed</option>
                    <option value="PENDING">Pending</option>
                </select>
                <div class="btn-group">
                    <button type="button" class="btn btn-outline-secondary btn-sm"><i class="fas fa-filter"></i>
                        Filter</button>
                    <button type="button" class="btn btn-outline-secondary btn-sm"><i class="fas fa-download"></i>
                        Export</button>
                </div>
            </div>
        </div>

        <div class="card shadow-sm border-0">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th>Date & Time</th>
                            <th>Order ID</th>
                            <th>Amount</th>
                            <th>Provider</th>
                            <th>Transaction ID</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${transactions.empty}">
                            <td colspan="7" class="text-center py-5 text-muted">
                                <i class="fas fa-search fa-3x mb-3 d-block opacity-25"></i>
                                No transactions found for the selected criteria.
                            </td>
                        </tr>
                        <tr th:each="tx : ${transactions.content}">
                            <td th:text="${#temporals.format(tx.createdAt, 'MMM dd, yyyy HH:mm:ss')}">Date</td>
                            <td>
                                <a th:href="@{/admin/orders/{id}(id=${tx.orderId})}"
                                    class="text-decoration-none fw-bold" th:text="${tx.orderId}">Order</a>
                            </td>
                            <td class="fw-bold">
                                <span th:text="${tx.currency}">INR</span>
                                <span th:text="${#numbers.formatDecimal(tx.amount, 1, 2)}">0.00</span>
                            </td>
                            <td>
                                <span th:class="${tx.gatewayType == 'stripe' ? 'badge bg-primary' : 'badge bg-info'}"
                                    th:text="${#strings.capitalize(tx.gatewayType)}">Stripe</span>
                            </td>
                            <td class="font-monospace small"
                                th:text="${tx.gatewayTransactionId != null ? tx.gatewayTransactionId : 'N/A'}">tx_123
                            </td>
                            <td>
                                <span class="badge"
                                    th:classappend="${tx.status == 'SUCCEEDED' ? 'bg-success' : (tx.status == 'FAILED' ? 'bg-danger' : 'bg-warning')}"
                                    th:text="${tx.status}">Status</span>
                            </td>
                            <td>
                                <a th:href="@{/admin/payments/transactions/{id}(id=${tx.paymentId})}"
                                    class="btn btn-sm btn-light border" title="View Details">
                                    <i class="fas fa-eye"></i>
                                </a>
                                <a th:if="${tx.status == 'SUCCEEDED'}"
                                    th:href="@{/admin/refunds/create(paymentId=${tx.paymentId})}"
                                    class="btn btn-sm btn-outline-danger" title="Issue Refund">
                                    <i class="fas fa-undo"></i>
                                </a>
                                <a th:if="${tx.gatewayType == 'stripe' and tx.gatewayTransactionId != null}"
                                    th:href="'https://dashboard.stripe.com/payments/' + ${tx.gatewayTransactionId}"
                                    target="_blank" rel="noopener noreferrer"
                                    class="btn btn-sm btn-outline-primary ms-1" title="View in Stripe">
                                    <i class="fas fa-external-link-alt"></i>
                                </a>
                                <a th:if="${tx.gatewayType == 'razorpay' and tx.gatewayTransactionId != null}"
                                    th:href="'https://dashboard.razorpay.com/payments/' + ${tx.gatewayTransactionId}"
                                    target="_blank" rel="noopener noreferrer" class="btn btn-sm btn-outline-info ms-1"
                                    title="View in Razorpay">
                                    <i class="fas fa-external-link-alt"></i>
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <div class="card-footer bg-white d-flex justify-content-between align-items-center"
                th:if="${transactions.totalPages > 1}">
                <div class="text-muted small">
                    Showing <span th:text="${transactions.numberOfElements}">0</span> of <span
                        th:text="${transactions.totalElements}">0</span> transactions
                </div>
                <nav aria-label="Page navigation">
                    <ul class="pagination pagination-sm mb-0">
                        <li class="page-item" th:classappend="${!transactions.hasPrevious()} ? 'disabled'">
                            <a class="page-link"
                                th:href="@{/admin/payments/transactions(page=${transactions.number - 1})}">Previous</a>
                        </li>
                        <li class="page-item disabled">
                            <span class="page-link">Page <span th:text="${transactions.number + 1}">1</span> of <span
                                    th:text="${transactions.totalPages}">1</span></span>
                        </li>
                        <li class="page-item" th:classappend="${!transactions.hasNext()} ? 'disabled'">
                            <a class="page-link"
                                th:href="@{/admin/payments/transactions(page=${transactions.number + 1})}">Next</a>
                        </li>
                    </ul>
                </nav>
            </div>
        </div>
    </div>
    <div id="scripts"></div>
</body>

</html>
