<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
    th:replace="~{admin/layout/base :: layout(~{::title}, ~{::#content}, ~{::#head}, ~{::#scripts})}">

<head>
    <title>Audit Log - Admin</title>
    <div id="head"></div>
</head>

<body>
    <div id="content">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2><i class="fas fa-clipboard-list me-2"></i>Audit Log</h2>
            <div class="d-flex gap-2">
                <select class="form-select form-select-sm" style="width: auto;"
                    onchange="location.href='/admin/audit?entityType='+this.value">
                    <option value="">All Types</option>
                    <option value="ORDER" th:selected="${entityType == 'ORDER'}">Orders</option>
                    <option value="PRODUCT" th:selected="${entityType == 'PRODUCT'}">Products</option>
                    <option value="INVENTORY" th:selected="${entityType == 'INVENTORY'}">Inventory</option>
                    <option value="REFUND" th:selected="${entityType == 'REFUND'}">Refunds</option>
                    <option value="PAYMENT" th:selected="${entityType == 'PAYMENT'}">Payments</option>
                </select>
            </div>
        </div>

        <div class="card">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>Action</th>
                            <th>Entity</th>
                            <th>Entity ID</th>
                            <th>Performed By</th>
                            <th>Details</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:if="${logs == null or logs.empty}">
                            <td colspan="6" class="text-center py-4 text-muted">No audit entries found.</td>
                        </tr>
                        <tr th:each="log : ${logs}">
                            <td>
                                <small th:text="${#temporals.format(log.createdAt, 'MMM dd, HH:mm:ss')}">Jan 01</small>
                            </td>
                            <td>
                                <span class="badge"
                                    th:classappend="${log.action.contains('CREATE') or log.action.contains('APPROVE') ? 'bg-success' : 
                                                      (log.action.contains('DELETE') or log.action.contains('REJECT') ? 'bg-danger' : 'bg-primary')}"
                                    th:text="${log.action}">ACTION</span>
                            </td>
                            <td><span class="badge bg-secondary" th:text="${log.entityType}">ORDER</span></td>
                            <td><span class="font-monospace small"
                                    th:text="${#strings.abbreviate(log.entityId, 16)}">ID</span></td>
                            <td th:text="${log.performedBy}">admin</td>
                            <td><small class="text-muted"
                                    th:text="${log.details != null ? #strings.abbreviate(log.details, 60) : '—'}">Details</small>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
            <!-- Pagination -->
            <div class="card-footer d-flex justify-content-between align-items-center" th:if="${totalPages > 1}">
                <small class="text-muted" th:text="'Page ' + (${currentPage} + 1) + ' of ' + ${totalPages}"></small>
                <div>
                    <a th:if="${currentPage > 0}"
                        th:href="@{/admin/audit(page=${currentPage - 1}, entityType=${entityType})}"
                        class="btn btn-sm btn-outline-primary">Previous</a>
                    <a th:if="${currentPage < totalPages - 1}"
                        th:href="@{/admin/audit(page=${currentPage + 1}, entityType=${entityType})}"
                        class="btn btn-sm btn-outline-primary">Next</a>
                </div>
            </div>
        </div>
    </div>
    <div id="scripts"></div>
</body>

</html>
