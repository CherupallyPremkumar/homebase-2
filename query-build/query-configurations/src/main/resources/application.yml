server:
  port: 8081

logging:
  level:
    ROOT: INFO
    org.hibernate.SQL: DEBUG
    org.chenile.*: DEBUG

spring:
  banner:
    location: classpath:banner.txt
  devtools:
    restart:
      enabled: true
      additional-exclude: static/**,.h2.server.properties
    livereload:
      enabled: false # we use Webpack dev server + BrowserSync for livereload
  jackson:
    serialization:
      indent-output: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/homebase}
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:postgresql://localhost:5432/ecommerce_db
    username: postgres
    password: password
    hikari:
      poolName: Hikari
      auto-commit: false
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: true
  liquibase:
    contexts: dev, faker

  messages:
    cache-duration: PT1S
  thymeleaf:
    cache: false



chenile:
  base:
    url: http://localhost:8081
  module:
    name: query-service
  security:
    client:
      id: ${KEYCLOAK_CLIENT_ID:homebase-backend}
      secret: ${KEYCLOAK_CLIENT_SECRET:change-me}
    keycloak:
      host: ${KEYCLOAK_HOST:http://localhost:8180}
      port: ${KEYCLOAK_PORT:8180}
      base:
        realm: ${KEYCLOAK_REALM:homebase}

query:
  jpa:
    hibernate:
      show_sql: 'true'
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: 'true'
        dialect: org.hibernate.dialect.PostgreSQLDialect
  defaultTenantId: homebase
  datasources:
    homebase:
      maximumPoolSize: '10'
      type: com.zaxxer.hikari.HikariDataSource
      username: postgres
      password: password
      minimumIdle: '2'
      idleTimeout: '5000'
      jdbcUrl: jdbc:postgresql://localhost:5432/ecommerce_db
      driverClassName: org.postgresql.Driver
  mapperFiles: classpath*:com/homebase/ecom/query/service/mapper/*.xml
  definitionFiles: classpath*:com/homebase/ecom/query/service/mapper/*.json

