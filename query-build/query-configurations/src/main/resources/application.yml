server:
  port: 8081

logging:
  level:
    ROOT: INFO
    org.hibernate.SQL: DEBUG
    org.chenile.*: DEBUG

spring:
  banner:
    location: classpath:banner.txt
  devtools:
    restart:
      enabled: true
      additional-exclude: static/**,.h2.server.properties
    livereload:
      enabled: false # we use Webpack dev server + BrowserSync for livereload
  jackson:
    serialization:
      indent-output: true
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:8180/realms/homebase}
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:postgresql://localhost:5432/ecommerce_db
    username: postgres
    password: password
    hikari:
      poolName: Hikari
      auto-commit: false
      connection-init-sql: >
        SET search_path TO
        public, hm_order, hm_user, hm_product, hm_cart, hm_checkout, hm_payment,
        hm_inventory, hm_shipping, hm_supplier, hm_settlement, hm_promo,
        hm_fulfillment, hm_warehouse, hm_notification, hm_support, hm_review,
        hm_return_request, hm_return_processing, hm_offer, hm_pricing, hm_catalog,
        hm_cms, hm_compliance, hm_tax, hm_cconfig, hm_organisation, hm_media,
        hm_rules_engine, hm_onboarding, hm_seller, hm_dispute, hm_recommendation,
        hm_analytics, hm_reconciliation, hm_reporting, hm_clickstream, hm_invoice,
        hm_supplier_lifecycle, hm_seller_lifecycle, hm_wishlist, hm_infrastructure
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  h2:
    console:
      enabled: true
  liquibase:
    change-log: classpath:liquibase/query/changelog-master.xml
    contexts: dev, faker

  messages:
    cache-duration: PT1S
  thymeleaf:
    cache: false



chenile:
  base:
    url: http://localhost:8081
  module:
    name: query-service
  security:
    client:
      id: ${KEYCLOAK_CLIENT_ID:homebase-backend}
      secret: ${KEYCLOAK_CLIENT_SECRET:change-me}
    keycloak:
      host: ${KEYCLOAK_HOST:http://localhost:8180}
      port: ${KEYCLOAK_PORT:8180}
      base:
        realm: ${KEYCLOAK_REALM:homebase}

query:
  jpa:
    hibernate:
      show_sql: 'true'
      ddl-auto: update
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: 'true'
        dialect: org.hibernate.dialect.PostgreSQLDialect
  defaultTenantId: homebase
  datasources:
    homebase:
      maximumPoolSize: '10'
      type: com.zaxxer.hikari.HikariDataSource
      username: postgres
      password: password
      minimumIdle: '2'
      idleTimeout: '5000'
      jdbcUrl: jdbc:postgresql://localhost:5432/ecommerce_db
      driverClassName: org.postgresql.Driver
  mapperFiles: classpath*:com/homebase/ecom/query/service/mapper/*.xml
  definitionFiles: classpath*:com/homebase/ecom/query/service/mapper/*.json

