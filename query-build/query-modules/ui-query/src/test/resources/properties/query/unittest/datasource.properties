query.defaultTenantId=homebase

query.datasource's.homebase.type=com.zaxxer.hikari.HikariDataSource
query.datasource's.homebase.minimumIdle=2
query.datasource's.homebase.maximumPoolSize=10
query.datasource's.homebase.idleTimeout=5000
query.datasource's.homebase.jdbcUrl=jdbc:h2:mem:uiquery;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
query.datasource's.homebase.username=sa
query.datasource's.homebase.password=

query.mapperFiles=classpath*:com/homebase/ecom/query/service/mapper/*.xml
query.definitionFiles=classpath*:com/homebase/ecom/query/service/mapper/*.json

##Liquibase
query.datasource's.homebase.liquibase.change-log=classpath:liquibase/query/changelog/changelog-master.xml
