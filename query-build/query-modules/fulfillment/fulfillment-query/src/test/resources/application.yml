spring:
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: jdbc:h2:mem:fulfillquery;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
    username: sa
    password:
  liquibase:
    enabled: true
    change-log: classpath:liquibase/query/changelog/changelog-master.xml
  jpa:
    hibernate:
      ddl-auto: none

query:
  defaultTenantId: homebase
  datasource's:
    homebase:
      maximumPoolSize: '10'
      type: com.zaxxer.hikari.HikariDataSource
      username: sa
      password:
      minimumIdle: '2'
      idleTimeout: '5000'
      jdbcUrl: jdbc:h2:mem:fulfillquery;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
  mapperFiles: classpath*:com/homebase/ecom/query/service/mapper/*.xml
  definitionFiles: classpath*:com/homebase/ecom/query/service/mapper/*.json

chenile:
  base:
    url:
  security:
    client:
      id: authz-servlet
      secret: secret
    keycloak:
      host: ${KEYCLOAK_HOST:http://localhost:8180}
      port: ${KEYCLOAK_PORT:8180}
      base:
        realm: ${KEYCLOAK_REALM:tenant0}
