logging:
  level:
    ROOT: INFO
    org.chenile.*: DEBUG

chenile:
  base:
    url:
  security:
    client:
      id: authz-servlet
      secret: secret
    keycloak:
      host: http://localhost:8180
      port: 8180
      base:
        realm: ${KEYCLOAK_REALM:tenant0}

pubsub:
  topic:
    separator: "."

spring:
  main:
    allow-bean-definition-overriding: true
  kafka:
    bootstrap-server: localhost:9092
  jackson:
    serialization:
      indent-output: true
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:h2:mem:rulesenginedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    hikari:
      poolName: Hikari
      auto-commit: false
  jpa:
    hibernate:
      ddl-auto: update

server:
  port: 8085
  error:
    whitelabel:
      enabled: false
