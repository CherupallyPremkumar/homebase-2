<div class="page-header">
    <h1>Policies</h1>
    <button class="btn btn-primary" routerLink="/policies/new">Create Policy</button>
</div>

<div class="card-grid">
    <div *ngFor="let policy of policies" class="policy-card">
        <div class="card-title">
            <h3>{{ policy.name }}</h3>
            <span class="status" [class.active]="policy.active">{{ policy.active ? 'Active' : 'Draft' }}</span>
        </div>
        <p class="description">{{ policy.description }}</p>
        <div class="card-footer">
            <span class="module-badge" *ngIf="policy.targetModule">{{ policy.targetModule }}</span>
            <span>{{ policy.rules.length }} Rules</span>
            <a [routerLink]="['/policies', policy.id]" class="btn-link">Edit Details</a>
        </div>
    </div>
</div>
