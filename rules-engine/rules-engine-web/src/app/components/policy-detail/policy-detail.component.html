<div *ngIf="policy" class="detail-container">
    <div class="page-header">
        <div class="breadcrumb">
            <a routerLink="/policies">Policies</a> / {{ policy.id ? policy.name : 'New Policy' }}
        </div>
        <div class="actions">
            <button class="btn btn-outline" routerLink="/policies">Cancel</button>
            <button class="btn btn-primary" (click)="savePolicy()">Save Policy</button>
        </div>
    </div>

    <section class="policy-info card">
        <h2>Policy Information</h2>
        <div class="form-group">
            <label>Name</label>
            <input type="text" [(ngModel)]="policy.name" class="form-control">
        </div>
        <div class="form-group">
            <label>Description</label>
            <textarea [(ngModel)]="policy.description" class="form-control"></textarea>
        </div>
        <div class="form-group">
            <label>Domain Module</label>
            <select [(ngModel)]="policy.targetModule" class="form-control">
                <option value="">-- Select Module --</option>
                <option *ngFor="let module of modules" [value]="module">{{ module }}</option>
            </select>
            <small class="form-text text-muted">Module for unified policy evaluation.</small>
        </div>
        <div class="form-row">
            <div class="form-group">
                <label>Default Effect</label>
                <select [(ngModel)]="policy.defaultEffect" class="form-control">
                    <option value="ALLOW">ALLOW</option>
                    <option value="DENY">DENY</option>
                    <option value="ABSTAIN">ABSTAIN</option>
                </select>
            </div>
            <div class="form-group checkbox-group">
                <label>
                    <input type="checkbox" [(ngModel)]="policy.active"> Active
                </label>
            </div>
        </div>
    </section>

    <section class="rules-section">
        <div class="section-header">
            <h2>Rules</h2>
            <button class="btn btn-sm btn-primary" (click)="addRule()">Add Rule</button>
        </div>

        <div class="rules-list">
            <div *ngFor="let rule of policy.rules" class="rule-item card">
                <div class="rule-header">
                    <div class="rule-title">
                        <strong>{{ rule.name }}</strong>
                        <span class="badge" [class.badge-allow]="rule.effect === 'ALLOW'"
                            [class.badge-deny]="rule.effect === 'DENY'">
                            {{ rule.effect }}
                        </span>
                    </div>
                    <div class="rule-actions">
                        <button class="btn-icon" (click)="editRule(rule)">✎</button>
                        <button class="btn-icon btn-danger" (click)="deleteRule(rule)">✖</button>
                    </div>
                </div>
                <code>{{ rule.expression }}</code>
                <div class="rule-meta">Priority: {{ rule.priority }}</div>
            </div>
        </div>
    </section>

    <div *ngIf="editingRule" class="modal-overlay">
        <div class="modal">
            <app-rule-editor [rule]="editingRule" (save)="saveRule($event)" (cancel)="cancelEdit()">
            </app-rule-editor>
        </div>
    </div>
</div>
