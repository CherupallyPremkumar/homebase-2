<div class="page-header">
    <h1>Testing Sandbox</h1>
    <p>Simulate policy evaluation with custom JSON contexts.</p>
</div>

<div class="card-grid" style="display: block;">
    <div class="card" style="margin-bottom: 20px;">
        <h3 style="margin-top: 0;">1. Select Policy or Module</h3>
        <div style="display: flex; gap: 20px;">
            <div style="flex: 1;">
                <label>By Specific Policy:</label>
                <select [(ngModel)]="selectedPolicyId" (change)="selectedModule = ''" style="width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ddd; border-radius: 4px;">
                    <option value="">-- Choose a Policy --</option>
                    <option *ngFor="let policy of policies" [value]="policy.id">{{ policy.name }}</option>
                </select>
            </div>
            <div style="flex: 1;">
                <label>By Unified Module:</label>
                <select [(ngModel)]="selectedModule" (change)="selectedPolicyId = ''" style="width: 100%; padding: 10px; margin-top: 10px; border: 1px solid #ddd; border-radius: 4px;">
                    <option value="">-- Choose a Module --</option>
                    <option *ngFor="let module of modules" [value]="module">{{ module }}</option>
                </select>
            </div>
        </div>
    </div>

    <div class="card" style="margin-bottom: 20px;">
        <h3 style="margin-top: 0;">2. Provide Context (JSON)</h3>
        <textarea [(ngModel)]="testPayload" rows="10" style="width: 100%; padding: 10px; margin-top: 10px; font-family: monospace; border: 1px solid #ddd; border-radius: 4px;"></textarea>
    </div>

    <div style="margin-bottom: 20px;">
        <button class="btn btn-primary" (click)="evaluate()">Run Evaluation</button>
    </div>

    <div *ngIf="error" class="card" style="margin-bottom: 20px; background-color: #fee; border-left: 4px solid #c00;">
        <p style="color: #c00; margin: 0;"><strong>Error:</strong> {{ error }}</p>
    </div>

    <div class="card" *ngIf="result">
        <h3 style="margin-top: 0;">Evaluation Result</h3>
        
        <div style="margin-top: 20px; padding: 20px; background: #f9f9f9; border-radius: 8px; border: 1px solid #eee;">
            <div style="margin-bottom: 15px;">
                <span style="font-weight: bold; margin-right: 15px;">Effect:</span>
                <span class="status" [ngClass]="{
                    'active': result.effect === 'ALLOW',
                    'inactive': result.effect === 'DENY'
                }" style="font-size: 1.2em; padding: 5px 15px;">{{ result.effect }}</span>
            </div>
            
            <div style="margin-bottom: 15px;">
                <span style="font-weight: bold; margin-right: 15px;">Reasons:</span>
                <span style="color: #666;">{{ result.reasons || 'No specific reasons provided.' }}</span>
            </div>

            <div>
                <span style="font-weight: bold; display: block; margin-bottom: 10px;">Raw Response:</span>
                <pre style="background: #252a33; color: #abb2bf; padding: 15px; border-radius: 4px; overflow-x: auto;">{{ result | json }}</pre>
            </div>
        </div>
    </div>
</div>
