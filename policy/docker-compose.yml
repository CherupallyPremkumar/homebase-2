services:
  policy-app:
    build:
      context: ..
      dockerfile: policy/policy-app/Dockerfile # Assuming I'll create one or use a generic one
    ports:
      - "8085:8085"
    environment:
      - SPRING_PROFILES_ACTIVE=docker

  policy-web:
    build:
      context: ./policy-web
      dockerfile: Dockerfile
    ports:
      - "4200:80"
    depends_on:
      - policy-app
