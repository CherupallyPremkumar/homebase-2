logging:
  level:
    ROOT: INFO
    org.hibernate.SQL: INFO
    org.chenile.*: DEBUG
    com.homebase.ecom.supplier.*: DEBUG

chenile:
  base:
    url:
  security:
    client:
      id: authz-servlet
      secret: secret
    keycloak:
      host: \${KEYCLOAK_HOST:http://localhost:8180}
      port: \${KEYCLOAK_PORT:8180}
      base:
        realm: \${KEYCLOAK_REALM:tenant0}

spring:
  banner:
    location: classpath:banner.txt
  devtools:
    restart:
      enabled: true
      additional-exclude: static/**,.h2.server.properties
    livereload:
      enabled: false
  jackson:
    serialization:
      indent-output: true
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:h2:mem:demo;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: demo
    password: password
    hikari:
      poolName: Hikari
      auto-commit: false
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true

  liquibase:
    enabled: false

  messages:
    cache-duration: PT1S
  thymeleaf:
    cache: false

server:
  port: 8000
  error:
    whitelabel:
      enabled: false

