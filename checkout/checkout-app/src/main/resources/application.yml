spring:
  application:
    name: checkout-service
  main:
    allow-bean-definition-overriding: true
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ecommerce_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:password}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  kafka:
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
  flyway:
    enabled: false
  liquibase:
    enabled: false

server:
  port: ${SERVER_PORT:8083}

# Feign Client URLs — use K8s service names
cart:
  service:
    url: ${CART_SERVICE_URL:http://localhost:8080}
pricing:
  service:
    url: ${PRICING_SERVICE_URL:http://localhost:8081}
order:
  service:
    url: ${ORDER_SERVICE_URL:http://localhost:8084}
payment:
  service:
    url: ${PAYMENT_SERVICE_URL:http://localhost:8085}

# Resilience4j Config
resilience4j:
  circuitbreaker:
    instances:
      cartService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s
      pricingService:
        registerHealthIndicator: true
        slidingWindowSize: 10
        failureRateThreshold: 50
        waitDurationInOpenState: 10s

logging:
  level:
    com.homebase.ecom.checkout: INFO
    org.springframework.web: INFO
