logging:
  level:
    ROOT: INFO
    org.hibernate.SQL: INFO
    org.chenile.*: DEBUG

spring:
  banner:
    location: classpath:banner.txt
  jackson:
    serialization:
      indent-output: true
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    # URL/username/password injected by SpringTestConfig @DynamicPropertySource
    hikari:
      poolName: Hikari
      auto-commit: false
  liquibase:
    enabled: true
    change-log: classpath:liquibase/query/changelog/changelog-master.xml

  messages:
    cache-duration: PT1S
  thymeleaf:
    cache: false

server:
  port: 8000
  error:
    whitelabel:
      enabled: false

chenile:
  base:
    url:

query:
  defaultTenantId: homebase
  datasources:
    homebase:
      maximumPoolSize: '10'
      type: com.zaxxer.hikari.HikariDataSource
      # jdbcUrl/username/password injected by SpringTestConfig @DynamicPropertySource
      minimumIdle: '2'
      idleTimeout: '5000'
  mapperFiles: classpath*:com/homebase/ecom/query/service/mapper/*.xml
  definitionFiles: classpath*:com/homebase/ecom/query/service/mapper/*.json
