server:
  port: 8081

spring:
  main:
    allow-bean-definition-overriding: true
  application:
    name: catalog-service
  datasource:
    url: jdbc:postgresql://localhost:5432/homebase
    username: postgres
    password: password
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

chenile:
  query:
    metadata:
      path: classpath*:com/homebase/ecom/query/service/mapper/*.json
    mapper:
      path: classpath*:com/homebase/ecom/query/service/mapper/*.xml
