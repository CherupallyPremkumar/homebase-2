# Chenile configuration for standalone microservice deployment
chenile.security.ignore=true
chenile.query.proxy.enabled=false
chenile.base.url=${CHENILE_BASE_URL:http://localhost:8080}
chenile.module.name=${spring.application.name:homebase-service}
chenile.service.json.package=classpath*:com/homebase/ecom/**/service/*.json,classpath*:org/chenile/**/service/*.json
chenile.event.json.package=classpath*:com/homebase/ecom/**/event/*.json
chenile.cache.json.package=classpath*:com/homebase/ecom/**/cache/*.json
chenile.interceptors.path=org/chenile/core/chenile-core.xml
chenile.config.path=com/homebase/ecom/config
chenile.pre.processors=populateContextContainer
chenile.post.processors=
chenile.copy.headers.strategy=
chenile.swagger.options.headers[0].name=x-chenile-tenant-id
chenile.swagger.options.headers[0].required=false
chenile.swagger.options.headers[0].description=Tenant ID

