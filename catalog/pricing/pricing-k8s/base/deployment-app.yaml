apiVersion: apps/v1
kind: Deployment
metadata:
  name: pricing
  namespace: pricing
  labels:
    app.kubernetes.io/name: pricing
    app.kubernetes.io/part-of: homebase
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pricing
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pricing
    spec:
      containers:
        - name: pricing
          image: homebase-pricingatest
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: pricing-config
            - secretRef:
                name: pricing-secrets
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: 2000m
              memory: 2Gi
