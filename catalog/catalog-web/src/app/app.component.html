<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>HomeBase Marketplace</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,700;1,700&display=swap" rel="stylesheet">
</head>
<body>
  <div class="app-shell">
    <nav class="navbar glass">
      <div class="logo">
        <span class="logo-text">HOME<span class="accent">BASE</span></span>
      </div>
      <ul class="nav-links">
        <li><a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a></li>
        <li><a routerLink="/gallery" routerLinkActive="active">Catalog</a></li>
        <li><a href="#">Makers</a></li>
        <li><a href="#">About</a></li>
      </ul>
      <div class="nav-actions">
        <button class="btn-icon">Search</button>
        <button class="btn-icon">Cart</button>
      </div>
    </nav>

    <main class="main-content">
      <router-outlet></router-outlet>
    </main>

    <footer class="footer">
      <div class="footer-content">
        <div class="footer-brand">
          <h3>HOMEBASE</h3>
          <p>Connecting master artisans to the world.</p>
        </div>
        <div class="footer-links">
          <h4>Platform</h4>
          <ul>
            <li><a href="#">How it works</a></li>
            <li><a href="#">For Makers</a></li>
            <li><a href="#">Support</a></li>
          </ul>
        </div>
      </div>
      <div class="footer-bottom">
        <p>&copy; 2026 HomeBase Marketplace. All rights reserved.</p>
      </div>
    </footer>
  </div>
</body>
</html>
