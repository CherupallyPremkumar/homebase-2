logging:
  level:
    ROOT: INFO
    org.hibernate.SQL: INFO
    org.chenile.*: DEBUG

chenile:
  base:
    url:
  security:
    client:
      id: authz-servlet
      secret: secret
    keycloak:
      host: ${KEYCLOAK_HOST:http://localhost:8180}
      port: ${KEYCLOAK_PORT:8180}
      base:
        realm: ${KEYCLOAK_REALM:tenant0}

spring:
  banner:
    location: classpath:banner.txt
  jackson:
    serialization:
      indent-output: true
  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: jdbc:h2:mem:catalog;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: demo
    password: password
    hikari:
      poolName: Hikari
      auto-commit: false

  liquibase:
    contexts: dev, faker

  jpa:
    hibernate:
      ddl-auto: create-drop

server:
  port: 8000
  error:
    whitelabel:
      enabled: false
