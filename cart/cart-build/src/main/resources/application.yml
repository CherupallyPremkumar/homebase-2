server:
  port: 8081

spring:
  application:
    name: cart-service
  datasource:
    url: jdbc:h2:mem:cartdb;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

chenile:
  service:
    registry:
      enabled: true
  workflow:
    enabled: true

logging:
  level:
    org.chenile: DEBUG
    com.homebase.ecom.cart: DEBUG
