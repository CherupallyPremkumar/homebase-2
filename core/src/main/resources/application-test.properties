spring.datasource.url=jdbc:h2:mem:querytestdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable Flyway
spring.flyway.enabled=true
# Load migrations from both standard folder and the build-configurations folder
spring.flyway.locations=classpath:db/migration,classpath:db.migration
spring.flyway.baseline-on-migrate=true

spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:test_data.sql
