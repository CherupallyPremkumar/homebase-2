server:
  port: 8080

logging:
  level:
    ROOT: INFO
    org.chenile: DEBUG
    com.homebase.ecom.demoorder: DEBUG

pubsub:
  topic:
    separator: "."

spring:
  main:
    allow-bean-definition-overriding: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    bootstrap-server: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
  datasource:
    url: jdbc:h2:file:./demo-order-db;MODE=PostgreSQL;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create
  h2:
    console:
      enabled: true
