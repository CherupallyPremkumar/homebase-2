status_legend:
  todo: Not started
  in_progress: Started but not complete
  blocked: Blocked on a dependency/decision
  done: Completed

principles:
  - Keep financial records append-only where feasible (webhooks/imports/journals).
  - Use idempotency for all gateway ingestion paths (webhooks + batch imports).
  - Prefer gateway-agnostic naming in schema and code (avoid Stripe-specific columns/entities).

agent_pickup_policy:
  - "Tasks marked ready_for_pickup: true are intended for other agents to pick up in parallel."
  - "When an agent starts a task, set status: in_progress and set owner: <agent_name>."
  - "When finished, set status: done and optionally add notes with PR/commit references."

code_review_handoff:
  where_to_check:
    - "Branch has many untracked/unstaged changes; run 'git status' first and ensure new files are added before expecting diffs."
    - "Staged renames move repositories/services out of shared into bounded contexts: admin/, customer/, order/."
  review_commands:
    - git --no-pager status
    - git --no-pager diff --cached --name-status
    - git --no-pager diff --name-status
    - mvn -q test
    - mvn -q -pl payment/payment-service -am test
  hotspots:
    reconciliation:
      - admin/src/main/java/com/ecommerce/admin/controller/AdminAnalyticsController.java
      - admin/src/main/resources/templates/admin/analytics/reconciliation.html
      - payment/payment-batch/src/main/java/com/ecommerce/payment/batch/GatewayReconciliationDispatcher.java
      - payment/payment-batch/src/main/java/com/ecommerce/payment/batch/LegacyMismatchRunMaterializer.java
      - payment/payment-batch/src/main/java/com/ecommerce/payment/batch/StripeReconciliationService.java
      - web/src/main/resources/db/migration/V25__create_reconciliation_run_tables.sql
      - web/src/main/resources/db/migration/V27__add_resolved_by_index.sql
    webhooks:
      - payment/payment-service/src/main/java/com/ecommerce/payment/service/impl/WebhookServiceImpl.java
      - payment/payment-common/src/main/java/com/ecommerce/payment/domain/WebhookEvent.java
  key_review_findings:
    - "Resolved (agent1, 2026-02-24): reconciliation.html/controller bindings standardized to provider*/internal* fields and now support gatewayType selection."
    - "Resolved (agent1, 2026-02-24): resolve action persists resolved_by (Principal -> GatewayReconciliationDispatcher.resolveMismatch)."
    - "payment/payment-service/.../WebhookServiceImpl.java is currently untracked in git status; ensure it is added to version control before expecting other agents to review/merge it."

reconciliation_strategy:
  recommended: both
  primary_source_of_truth: provider_api
  secondary_source_of_truth: settlement_exports
  rationale:
    - Provider APIs give the cleanest, structured “ground truth” for payouts/fees/balance movements.
    - Settlement CSV/exports are useful as an audit artifact, backfill mechanism, and a safety net when APIs are incomplete/unavailable.
  implementation_notes:
    - Normalize both sources into provider_object / provider_balance_transaction.
    - Use DB uniqueness constraints on provider ids to guarantee idempotency.

bounded_contexts:
  - id: catalog
    classification: core
    responsibilities: [products, variants, pricing, media, categories]
  - id: customer
    classification: supporting
    responsibilities: [customer_profile, addresses, preferences, consent]
  - id: cart_checkout
    classification: supporting
    responsibilities: [cart_state, promotions, taxes_preview, shipping_selection]
  - id: order
    classification: core
    responsibilities: [order_placement, lifecycle, cancellations, returns_eligibility]
  - id: payments
    classification: core
    responsibilities: [auth_capture, refunds, disputes, webhooks]
  - id: inventory
    classification: supporting
    responsibilities: [stock_on_hand, reservations, adjustments]
  - id: fulfillment
    classification: supporting
    responsibilities: [shipment, tracking, delivery_confirmation, returns_workflow]
  - id: accounting_ledger
    classification: core
    responsibilities: [double_entry_ledger, journals, balances]
  - id: reconciliation
    classification: core
    responsibilities: [provider_imports, matching, mismatch_workflows, closeout]
  - id: notifications
    classification: generic
    responsibilities: [email, sms, whatsapp]
  - id: admin_backoffice
    classification: supporting
    responsibilities: [ops_workflows, reporting, configuration]

domain_model:
  aggregates:
    - id: order
      owns: [order_lines, totals, taxes, shipping_fee, status_transitions]
      invariants:
        - totals_equal_sum_lines_plus_tax_shipping_minus_discounts
    - id: payment_transaction
      owns: [attempts, provider_refs, status, authorized_amount, captured_amount, refunded_amount]
      invariants:
        - refunded_lte_captured
        - captured_lte_authorized_if_modeled
    - id: payout
      owns: [payout_totals_gross_fee_net, provider_payout_id, status, period]
      invariants:
        - payout_lines_sum_to_payout_totals
    - id: ledger_journal_entry
      owns: [lines]
      invariants:
        - debits_equal_credits
    - id: inventory_reservation
      owns: [reserved_qty, expiry, status]
      invariants:
        - cannot_reserve_more_than_available_per_policy
  domain_events:
    order: [OrderPlaced, OrderCancelled, OrderShipped, OrderReturned]
    payments: [PaymentAuthorized, PaymentCaptured, PaymentFailed, PaymentRefunded, DisputeOpened]
    payouts: [PayoutPaid, PayoutFailed]
    reconciliation: [ReconciliationRunCompleted, ReconciliationMismatchDetected]
  integration_rule:
    - "Cross-context communication happens via events or service interfaces (no cross-module repository calls, no shared tables)."

