<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/header :: head('Login - HomeMade')"></head>

<body class="bg-light">
    <div th:replace="fragments/header :: navbar"></div>
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-11 col-sm-8 col-md-4">
                <div class="card shadow">
                    <div class="card-body p-5">
                        <h3 class="text-center mb-4">
                            <i class="fas fa-store me-2"></i>HomeMade
                        </h3>
                        <h5 class="text-center text-muted mb-4">Sign in to your account</h5>

                        <div th:if="${param.error}" class="alert alert-danger">
                            Invalid email or password.
                        </div>
                        <div th:if="${param.logout}" class="alert alert-success">
                            You have been logged out.
                        </div>

                        <form th:action="@{/login}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="text" name="username" class="form-control" placeholder="Enter your email"
                                    required autofocus>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" name="password" class="form-control"
                                    placeholder="Enter your password" required>
                            </div>
                            <button type="submit" class="btn btn-primary w-100 mb-3">
                                <i class="fas fa-sign-in-alt me-1"></i>Sign In
                            </button>

                            <div class="text-center">
                                <p class="mb-0 text-muted">Don't have an account? <a th:href="@{/register}"
                                        class="text-decoration-none">Register</a></p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>

</html>
