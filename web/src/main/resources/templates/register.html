<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/header :: head('Register - HomeMade')"></head>

<body class="bg-light">
    <div th:replace="fragments/header :: navbar"></div>
    <div class="container">
        <div class="row justify-content-center mt-5">
            <div class="col-11 col-sm-10 col-md-6 col-lg-5">
                <div class="card shadow">
                    <div class="card-body p-4 p-md-5">
                        <h3 class="text-center mb-4">
                            <i class="fas fa-store me-2"></i>HomeMade
                        </h3>
                        <h5 class="text-center text-muted mb-4">Create your account</h5>

                        <form th:action="@{/register}" th:object="${registerDto}" method="post">
                            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
                            <div class="row g-3 mb-3">
                                <div class="col-sm-6">
                                    <label class="form-label">First Name</label>
                                    <input type="text" th:field="*{firstName}" class="form-control"
                                        placeholder="First name" th:errorclass="is-invalid">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('firstName')}"
                                        th:errors="*{firstName}"></div>
                                </div>
                                <div class="col-sm-6">
                                    <label class="form-label">Last Name</label>
                                    <input type="text" th:field="*{lastName}" class="form-control"
                                        placeholder="Last name" th:errorclass="is-invalid">
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('lastName')}"
                                        th:errors="*{lastName}"></div>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Email</label>
                                <input type="email" th:field="*{email}" class="form-control"
                                    placeholder="Enter your email" th:errorclass="is-invalid">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('email')}"
                                    th:errors="*{email}"></div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Password</label>
                                <input type="password" th:field="*{password}" class="form-control"
                                    placeholder="Create a password" th:errorclass="is-invalid">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('password')}"
                                    th:errors="*{password}"></div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label">Confirm Password</label>
                                <input type="password" th:field="*{confirmPassword}" class="form-control"
                                    placeholder="Confirm your password" th:errorclass="is-invalid">
                                <div class="invalid-feedback" th:if="${#fields.hasErrors('confirmPassword')}"
                                    th:errors="*{confirmPassword}"></div>
                            </div>

                            <button type="submit" class="btn btn-primary w-100 mb-3">
                                <i class="fas fa-user-plus me-1"></i>Sign Up
                            </button>

                            <div class="text-center">
                                <p class="mb-0 text-muted">Already have an account? <a th:href="@{/login}"
                                        class="text-decoration-none">Log in</a></p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>

</html>
