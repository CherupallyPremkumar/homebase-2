<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/header :: head('Error - HomeMade')"></head>

<body>
    <div th:replace="fragments/header :: navbar"></div>

    <div class="container my-5 text-center">
        <i class="fas fa-exclamation-triangle fa-3x text-danger mb-3"></i>
        <h2 th:text="${error} ?: 'Something went wrong'">Error</h2>
        <p class="text-muted" th:text="${message} ?: 'An unexpected error occurred. Please try again.'">Error message
        </p>
        <a href="/" class="btn btn-primary mt-3"><i class="fas fa-home me-1"></i>Go Home</a>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>

</html>
