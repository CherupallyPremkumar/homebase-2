<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/header :: head('My Orders - HomeMade')"></head>

<body>
    <div th:replace="fragments/header :: navbar"></div>

    <div class="container my-5">
        <h1 class="mb-4"><i class="fas fa-list me-2"></i>My Orders</h1>

        <div class="table-responsive" th:if="${orders != null and !orders.isEmpty()}">
            <table class="table table-hover">
                <thead class="table-dark">
                    <tr>
                        <th>Order ID</th>
                        <th>Date</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="order : ${orders}">
                        <td th:text="${#strings.abbreviate(order.id, 20)}">ORDER-123</td>
                        <td th:text="${#temporals.format(order.createdAt, 'yyyy-MM-dd HH:mm')}">2024-01-01</td>
                        <td>₹<span th:text="${#numbers.formatDecimal(order.totalAmount, 1, 2)}">0.00</span></td>
                        <td>
                            <span class="badge"
                                th:classappend="${#strings.toString(order.status) == 'PAID' ? 'bg-success' :
                                                   #strings.toString(order.status) == 'PENDING_PAYMENT' ? 'bg-warning' :
                                                   #strings.toString(order.status) == 'SHIPPED' ? 'bg-info' :
                                                   #strings.toString(order.status) == 'CANCELLED' ? 'bg-danger' : 'bg-secondary'}"
                                th:text="${order.status}">Status</span>
                        </td>
                        <td>
                            <a th:href="@{/orders/{id}(id=${order.id})}" class="btn btn-sm btn-outline-primary">
                                <i class="fas fa-eye"></i> View
                            </a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <div th:if="${orders == null or orders.isEmpty()}" class="text-center py-5">
            <i class="fas fa-receipt fa-3x text-muted mb-3"></i>
            <h4 class="text-muted">No orders yet</h4>
            <a href="/products" class="btn btn-primary mt-3">Start Shopping</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>

</html>
