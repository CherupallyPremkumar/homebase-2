<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head th:replace="fragments/header :: head('Products - HomeMade')"></head>

<body>
    <div th:replace="fragments/header :: navbar"></div>

    <style>
        .product-card {
            transition: transform 0.2s, box-shadow 0.2s;
            height: 100%;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }

        .product-image {
            height: 250px;
            object-fit: cover;
            background-color: #f0f0f0;
        }
    </style>

    <div class="container my-5">
        <h1 class="mb-4"><i class="fas fa-box me-2"></i>Our Products</h1>

        <!-- Search Bar -->
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="input-group">
                    <span class="input-group-text"><i class="fas fa-search"></i></span>
                    <input type="text" class="form-control" id="searchInput" placeholder="Search products...">
                </div>
            </div>
        </div>

        <!-- Product Grid -->
        <div class="row g-4" th:if="${products != null and !products.isEmpty()}">
            <div th:each="product : ${products}" class="col-md-4 col-lg-3">
                <div class="card product-card">
                    <img class="card-img-top product-image"
                        th:src="${product.imageUrl != null ? product.imageUrl : 'https://via.placeholder.com/300x250?text=Product'}"
                        th:alt="${product.name}">
                    <div class="card-body">
                        <h5 class="card-title">
                            <a th:href="@{/products/{id}(id=${product.id})}" th:text="${product.name}"
                                class="text-decoration-none">Product</a>
                        </h5>
                        <p class="card-text text-muted" th:text="${#strings.abbreviate(product.description, 100)}">
                            Description</p>
                        <h6 class="text-primary">
                            <strong>₹<span
                                    th:text="${offers[product.id] != null ? #numbers.formatDecimal(offers[product.id].price, 1, 2) : '0.00'}">0.00</span></strong>
                        </h6>
                        <div class="mb-2">
                            <span th:if="${offers[product.id] != null and offers[product.id].active}"
                                class="badge bg-success">In Stock</span>
                            <span th:unless="${offers[product.id] != null and offers[product.id].active}"
                                class="badge bg-danger">Out of Stock</span>
                        </div>
                    </div>
                    <div class="card-footer bg-white">
                        <button class="btn btn-primary w-100 add-to-cart-btn" th:data-product-id="${product.id}"
                            th:disabled="${offers[product.id] == null or !offers[product.id].active}">
                            <i class="fas fa-cart-plus me-1"></i>Add to Cart
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty State -->
        <div th:if="${products == null or products.isEmpty()}" class="text-center py-5">
            <i class="fas fa-box-open fa-3x text-muted mb-3"></i>
            <h4 class="text-muted">No products available</h4>
            <p>Check back soon for new products!</p>
        </div>

        <!-- Pagination -->
        <nav class="mt-5" th:if="${totalPages > 1}">
            <ul class="pagination justify-content-center">
                <li th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:classappend="${i == currentPage} ? 'active'" class="page-item">
                    <a th:href="@{/products(page=${i})}" class="page-link" th:text="${i + 1}">1</a>
                </li>
            </ul>
        </nav>
    </div>

    <!-- Toast Notification -->
    <div id="toast-container" class="position-fixed bottom-0 end-0 p-3" style="z-index: 1050;">
        <div id="cartToast" class="toast bg-success text-white" role="alert">
            <div class="toast-body"><i class="fas fa-check me-2"></i><span id="toastMessage">Item added to cart!</span>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const productId = e.currentTarget.dataset.productId;
                try {
                    const csrfToken = document.cookie.replace(/(?:(?:^|.*;\s*)XSRF-TOKEN\s*\=\s*([^;]*).*$)|^.*$/, "$1");
                    const response = await fetch('/products/' + productId + '/add-to-cart?quantity=1', {
                        method: 'POST',
                        headers: { 'X-XSRF-TOKEN': csrfToken }
                    });
                    if (response.ok) {
                        const data = await response.json();
                        showToast(data.message);
                        // Update cart badge count dynamically
                        const badge = document.getElementById('cartBadge');
                        if (badge && data.cartCount > 0) {
                            badge.textContent = data.cartCount;
                            badge.style.display = '';
                        }
                    }
                } catch (error) {
                    console.error('Error:', error);
                }
            });
        });

        function showToast(message) {
            document.getElementById('toastMessage').textContent = message;
            const toast = new bootstrap.Toast(document.getElementById('cartToast'));
            toast.show();
        }
    </script>
</body>

</html>
