<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/header :: head(${product.name} + ' - HomeMade')"></head>

<body>
    <div th:replace="fragments/header :: navbar"></div>

    <div class="container my-5">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="/products">Products</a></li>
                <li class="breadcrumb-item active" th:text="${product.name}">Product</li>
            </ol>
        </nav>

        <div class="row">
            <div class="col-md-6">
                <img class="img-fluid rounded shadow"
                    th:src="${product.imageUrl != null ? product.imageUrl : 'https://via.placeholder.com/500x400?text=Product'}"
                    th:alt="${product.name}">
            </div>
            <div class="col-md-6">
                <h1 th:text="${product.name}">Product Name</h1>
                <p class="text-muted" th:text="${product.category}">Category</p>
                <h3 class="text-primary mb-3">₹<span
                        th:text="${offer != null ? #numbers.formatDecimal(offer.price, 1, 2) : '0.00'}">0.00</span></h3>

                <div class="mb-3">
                    <span th:if="${offer != null and offer.active}" class="badge bg-success fs-6">In Stock</span>
                    <span th:unless="${offer != null and offer.active}" class="badge bg-danger fs-6">Out of Stock</span>
                </div>

                <p th:text="${product.description}">Product description goes here.</p>

                <div class="d-flex align-items-center gap-3 mt-4">
                    <input type="number" id="quantity" class="form-control" style="width: 80px" value="1" min="1"
                        max="10">
                    <button class="btn btn-primary btn-lg" id="addToCartBtn" th:data-product-id="${product.id}"
                        th:disabled="${offer == null or !offer.active}">
                        <i class="fas fa-cart-plus me-2"></i>Add to Cart
                    </button>
                </div>

                <a href="/products" class="btn btn-outline-secondary mt-3">
                    <i class="fas fa-arrow-left me-1"></i>Back to Products
                </a>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        document.getElementById('addToCartBtn')?.addEventListener('click', async () => {
            const productId = document.getElementById('addToCartBtn').dataset.productId;
            const quantity = document.getElementById('quantity').value;
            try {
                const csrfToken = document.cookie.replace(/(?:(?:^|.*;\s*)XSRF-TOKEN\s*\=\s*([^;]*).*$)|^.*$/, "$1");
                const response = await fetch('/products/' + productId + '/add-to-cart?quantity=' + quantity, {
                    method: 'POST',
                    headers: { 'X-XSRF-TOKEN': csrfToken }
                });
                if (response.ok) { alert('Added to cart!'); }
            } catch (error) { console.error('Error:', error); }
        });
    </script>
</body>

</html>
