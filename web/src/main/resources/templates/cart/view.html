<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/header :: head('Shopping Cart - HomeMade')"></head>

<body>
    <div th:replace="fragments/header :: navbar"></div>

    <div class="container my-5">
        <h1 class="mb-4"><i class="fas fa-shopping-cart me-2"></i>Shopping Cart</h1>

        <!-- Cart Items -->
        <div th:if="${cart != null and !cart.items.isEmpty()}">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead class="table-dark">
                        <tr>
                            <th>Product</th>
                            <th>Price</th>
                            <th>Quantity</th>
                            <th>Total</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${cart.items}">
                            <td>
                                <div class="d-flex align-items-center">
                                    <strong th:text="${item.productName}">Product Name</strong>
                                </div>
                            </td>
                            <td>₹<span th:text="${#numbers.formatDecimal(item.unitPrice, 1, 2)}">0.00</span></td>
                            <td th:text="${item.quantity}">1</td>
                            <td>₹<span th:text="${#numbers.formatDecimal(item.totalPrice, 1, 2)}">0.00</span></td>
                            <td>
                                <button class="btn btn-sm btn-outline-danger remove-btn"
                                    th:data-product-id="${item.productId}">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>

            <!-- Cart Summary -->
            <div class="row justify-content-end">
                <div class="col-md-4">
                    <div class="card">
                        <div class="card-body">
                            <h5 class="card-title">Cart Summary</h5>
                            <div class="d-flex justify-content-between mb-2">
                                <span>Subtotal:</span>
                                <span>₹<span th:text="${#numbers.formatDecimal(cart.subtotal, 1, 2)}">0.00</span></span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span>Tax (GST):</span>
                                <span>₹<span th:text="${#numbers.formatDecimal(cart.tax, 1, 2)}">0.00</span></span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span>Shipping:</span>
                                <span>₹<span th:text="${#numbers.formatDecimal(cart.shipping, 1, 2)}">0.00</span></span>
                            </div>
                            <hr>
                            <div class="d-flex justify-content-between">
                                <strong>Total:</strong>
                                <strong class="text-primary">₹<span
                                        th:text="${#numbers.formatDecimal(cart.total, 1, 2)}">0.00</span></strong>
                            </div>

                            <!-- Checkout button: different for guests vs logged-in users -->
                            <div th:if="${isLoggedIn}">
                                <a href="/checkout" class="btn btn-primary w-100 mt-3">
                                    <i class="fas fa-credit-card me-1"></i>Proceed to Checkout
                                </a>
                            </div>
                            <div th:unless="${isLoggedIn}">
                                <a href="/login" class="btn btn-primary w-100 mt-3">
                                    <i class="fas fa-sign-in-alt me-1"></i>Login to Checkout
                                </a>
                                <small class="text-muted d-block text-center mt-2">
                                    Your cart will be saved after login.
                                </small>
                            </div>

                            <a href="/products" class="btn btn-outline-secondary w-100 mt-2">
                                Continue Shopping
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Empty Cart -->
        <div th:if="${cart == null or cart.items.isEmpty()}" class="text-center py-5">
            <i class="fas fa-shopping-cart fa-3x text-muted mb-3"></i>
            <h4 class="text-muted">Your cart is empty</h4>
            <a href="/products" class="btn btn-primary mt-3">Browse Products</a>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
    <script>
        document.querySelectorAll('.remove-btn').forEach(btn => {
            btn.addEventListener('click', async () => {
                const productId = btn.dataset.productId;
                const csrfToken = document.cookie.replace(/(?:(?:^|.*;\s*)XSRF-TOKEN\s*\=\s*([^;]*).*$)|^.*$/, "$1");
                await fetch('/cart/remove/' + productId, {
                    method: 'DELETE',
                    headers: { 'X-XSRF-TOKEN': csrfToken }
                });
                location.reload();
            });
        });
    </script>
</body>

</html>
