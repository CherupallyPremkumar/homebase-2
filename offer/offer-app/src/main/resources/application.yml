server:
  port: 8080

spring:
  application:
    name: offer-service
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/offer_db}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

chenile:
  stm:
    flows:
      offer:
        resource: classpath:com/homebase/ecom/offer/offer-states.xml
        entity-class: com.homebase.ecom.offer.domain.model.Offer
        entity-store-bean: offerEntityStore

logging:
  level:
    org.chenile: DEBUG
    com.homebase.ecom.offer: DEBUG
