name: Deploy Backend Services

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      service:
        description: 'Service to deploy (leave empty to auto-detect changes)'
        required: false
        type: string

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY_PREFIX: homebase

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      has-changes: ${{ steps.set-matrix.outputs.has-changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed services
        id: set-matrix
        run: |
          ALL_SERVICES='["cart","catalog","checkout","inventory","offer","order","payment","pricing","product","promo","returnrequest","rules-engine","settlement","shipping","supplier","user"]'

          if [[ -n "${{ github.event.inputs.service }}" ]]; then
            SERVICES='["${{ github.event.inputs.service }}"]'
          else
            CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
            SERVICES=$(echo "$ALL_SERVICES" | jq -r '.[]' | while read svc; do
              # normalize: rules-engine dir is rules-engine
              if echo "$CHANGED_FILES" | grep -q "^$svc/"; then
                echo "$svc"
              fi
            done | jq -R . | jq -sc .)

            if [[ "$SERVICES" == "[]" || -z "$SERVICES" ]]; then
              echo "has-changes=false" >> $GITHUB_OUTPUT
              echo "matrix={\"service\":[]}" >> $GITHUB_OUTPUT
              exit 0
            fi
          fi

          echo "matrix={\"service\":$SERVICES}" >> $GITHUB_OUTPUT
          echo "has-changes=true" >> $GITHUB_OUTPUT
          echo "Services to deploy: $SERVICES"

  build-and-deploy:
    name: Build & Deploy ${{ matrix.service }}
    needs: detect-changes
    if: needs.detect-changes.outputs.has-changes == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix: ${{ fromJSON(needs.detect-changes.outputs.matrix) }}
      fail-fast: false

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Resolve app module
        id: module
        run: |
          if [[ "${{ matrix.service }}" == "cart" ]]; then
            echo "module=cart/cart-build" >> $GITHUB_OUTPUT
            echo "dir=cart/cart-build" >> $GITHUB_OUTPUT
          else
            echo "module=${{ matrix.service }}/${{ matrix.service }}-app" >> $GITHUB_OUTPUT
            echo "dir=${{ matrix.service }}/${{ matrix.service }}-app" >> $GITHUB_OUTPUT
          fi

      - name: Build JAR
        run: mvn install -pl ${{ steps.module.outputs.module }} -am -DskipTests -q

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push Docker image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          SERVICE: ${{ matrix.service }}
        run: |
          docker build \
            -t $ECR_REGISTRY/homebase-$SERVICE:$IMAGE_TAG \
            -t $ECR_REGISTRY/homebase-$SERVICE:latest \
            ${{ steps.module.outputs.dir }}
          docker push $ECR_REGISTRY/homebase-$SERVICE:$IMAGE_TAG
          docker push $ECR_REGISTRY/homebase-$SERVICE:latest
          echo "image=$ECR_REGISTRY/homebase-$SERVICE:$IMAGE_TAG" >> $GITHUB_OUTPUT
        id: push

      - name: Configure kubectl (EKS)
        uses: aws-actions/amazon-eks-set-context@v1
        with:
          cluster-name: ${{ secrets.EKS_CLUSTER_NAME }}
          region: ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
          SERVICE: ${{ matrix.service }}
        run: |
          cd ${{ matrix.service }}/${{ matrix.service }}-k8s/overlays/prod
          kustomize edit set image app=$ECR_REGISTRY/homebase-$SERVICE:$IMAGE_TAG
          kubectl apply -k .
          kubectl rollout status deployment/$SERVICE -n $SERVICE --timeout=300s

  deploy-query:
    name: Deploy Query Build
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' &&
      contains(github.event.commits[*].modified, 'query-build/') ||
      github.event.inputs.service == 'query'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: maven

      - name: Build query JAR
        run: mvn install -pl query-build/query-build-package -am -DskipTests -q

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & Push query image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build \
            -t $ECR_REGISTRY/homebase-query:$IMAGE_TAG \
            -t $ECR_REGISTRY/homebase-query:latest \
            query-build/query-build-package
          docker push $ECR_REGISTRY/homebase-query:$IMAGE_TAG
          docker push $ECR_REGISTRY/homebase-query:latest

      - name: Configure kubectl (EKS)
        uses: aws-actions/amazon-eks-set-context@v1
        with:
          cluster-name: ${{ secrets.EKS_CLUSTER_NAME }}
          region: ${{ env.AWS_REGION }}

      - name: Deploy query to EKS
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd query-build/query-build-package/k8s/overlays/prod
          kustomize edit set image query=$ECR_REGISTRY/homebase-query:$IMAGE_TAG
          kubectl apply -k .
          kubectl rollout status deployment/query -n query --timeout=300s
