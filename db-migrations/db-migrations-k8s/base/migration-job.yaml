apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  namespace: homebase
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: db-migrate
    spec:
      restartPolicy: OnFailure
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.36
        command: ['sh', '-c', 'until nc -z postgres.homebase.svc.cluster.local 5432; do echo waiting for postgres; sleep 2; done']
      containers:
      - name: db-migrate
        image: homebase/db-migrations:latest
        imagePullPolicy: Never
        env:
        - name: LIQUIBASE_COMMAND_URL
          value: jdbc:postgresql://postgres.homebase.svc.cluster.local:5432/ecommerce_db
        - name: LIQUIBASE_COMMAND_USERNAME
          value: postgres
        - name: LIQUIBASE_COMMAND_PASSWORD
          value: password
