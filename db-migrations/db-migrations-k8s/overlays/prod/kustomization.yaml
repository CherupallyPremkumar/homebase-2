apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      kind: Job
      name: db-migrate
    patch: |
      - op: replace
        path: /spec/template/spec/containers/0/env/0/value
        value: ${DB_URL}
      - op: replace
        path: /spec/template/spec/containers/0/env/1/value
        value: ${DB_USERNAME}
      - op: replace
        path: /spec/template/spec/containers/0/env/2/value
        value: ${DB_PASSWORD}
