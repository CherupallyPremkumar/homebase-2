# All Chenile configuration properties for Review test

chenile.
chenile.module.name=testcase
chenile.pre.processors=
chenile.post.processors=securityInterceptor
chenile.exception.handler=chenileExceptionHandler

chenile.query.proxy.enabled=true
chenile.query.remote.base-url=http://localhost:8081

chenile.service.json.package=classpath*:org/chenile/**/service/*.json
chenile.event.json.package=classpath*:com/homebase/ecom/review/event/*.json
chenile.interceptors.path=org/chenile/core/chenile-core.xml
